<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shadow Cards</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{background:#070707;color:#e8e4d8;font-family:Georgia,serif;overflow:hidden;height:100vh;touch-action:none}
#root{width:100vw;height:100vh;display:flex;flex-direction:column}
button{font-family:Georgia,serif;cursor:pointer;position:relative;transition:transform .08s,box-shadow .08s,filter .08s;border-radius:4px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.18) inset,   /* top inner highlight */
    0 -1px 0 rgba(0,0,0,.3) inset,          /* bottom inner shadow */
    0 4px 0 rgba(0,0,0,.6),                  /* bottom raised edge */
    0 5px 10px rgba(0,0,0,.45);              /* ambient shadow */
}
button:active{
  transform:translateY(3px)!important;
  box-shadow:
    0 1px 0 rgba(255,255,255,.1) inset,
    0 -1px 0 rgba(0,0,0,.3) inset,
    0 1px 0 rgba(0,0,0,.5),
    0 2px 4px rgba(0,0,0,.3)!important;
  filter:brightness(.85);
}

/* ── CARD ── */
.card{width:82px;height:112px;background:#f4f0e8;border:1px solid #222;border-radius:6px;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.55)}
.card.sm{width:68px;height:94px}
.card.sel{border:2px solid #ffd700!important;box-shadow:0 0 18px rgba(255,215,0,.75)!important}
.card.playable{border:1px solid rgba(30,120,255,.6)!important;box-shadow:0 0 28px rgba(0,100,255,.9),0 0 10px rgba(30,120,255,.75),0 0 4px rgba(80,160,255,.5)!important;animation:pBlue 1.8s ease-in-out infinite}
.card.faded{opacity:.22;filter:grayscale(70%);pointer-events:none}
.cname{position:absolute;top:18px;left:2px;right:2px;text-align:center;font-size:8px;color:#111;font-weight:bold;line-height:1.2}
.card.sm .cname{top:12px;font-size:7px}
.csym{position:absolute;top:38%;left:0;right:0;text-align:center;font-size:24px;color:#1a1a1a}
.card.sm .csym{font-size:18px}
.cdesc{position:absolute;bottom:6px;left:2px;right:2px;text-align:center;font-size:6.5px;color:#1a1a1a;line-height:1.3}

/* ── CARD BACK ── */
.cardback{width:68px;height:94px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* ── MINION ── */
.minion{width:68px;height:88px;background:#f4f0e8;border:1px solid #444;border-radius:6px;position:relative;cursor:pointer;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.5)}
.minion.can{border:1px solid rgba(30,120,255,.55)!important;box-shadow:0 0 26px rgba(0,100,255,.88),0 0 9px rgba(30,120,255,.7),0 0 3px rgba(80,160,255,.45)!important;animation:pBlue 1.8s ease-in-out infinite}
.minion.atk-sel{border:2px solid rgba(255,215,0,.8)!important;box-shadow:0 0 10px rgba(255,215,0,.4)!important;animation:none!important}
.minion.glow{border:2px dashed #c83030!important;box-shadow:0 0 10px rgba(200,50,50,.4)!important}
.minion.sick{opacity:.62}
.minion.lunging{animation:lunge .62s cubic-bezier(.25,0,.6,1) forwards!important;z-index:500!important;isolation:isolate;position:relative}
.minion.dying{animation:deathBurst 1.8s linear forwards!important;pointer-events:none}
.minion.new-summon{animation:minionIn .58s cubic-bezier(.15,1.35,.6,1) both}
.minion .mn{position:absolute;top:16px;left:0;right:0;text-align:center;font-size:7px;font-weight:bold;color:#111;padding:0 3px;line-height:1.1}
.minion.atk-sel .mn,.minion.atk-sel .ms{color:#aaa}
.minion .ms{position:absolute;top:42%;left:0;right:0;text-align:center;font-size:20px;color:#222}

/* ── HERO PORTRAIT ── */
.hport{position:relative;flex-shrink:0;transition:filter .15s;border-radius:50%}
.hport.tgt{filter:drop-shadow(0 0 11px rgba(200,48,48,.8));cursor:pointer}
.hport.drop-hi,.hp-bar-row.drop-hi{filter:drop-shadow(0 0 9px rgba(80,140,255,.7))!important}
.hport.drop-ready,.hp-bar-row.drop-ready{filter:drop-shadow(0 0 18px rgba(255,148,42,.95))!important;animation:rdyPulse .48s ease-in-out infinite}

/* ── ANIMATIONS ── */
@keyframes pBlue{0%,100%{box-shadow:0 0 8px rgba(20,100,210,.22),0 2px 6px rgba(0,0,0,.4)}50%{box-shadow:0 0 18px rgba(20,100,210,.6),0 2px 6px rgba(0,0,0,.4)}}
@keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes flyIn{0%{transform:translateX(320px) scale(.12) rotate(20deg);opacity:0}60%{transform:translateX(-6px) scale(1.06) rotate(-1deg);opacity:1}100%{transform:translateX(0) scale(1) rotate(0);opacity:1}}
@keyframes hpFlash{0%{filter:brightness(1)}30%{filter:brightness(2.5) saturate(1.4)}100%{filter:brightness(1)}}
@keyframes hpShake1{0%,100%{transform:translateX(0)}18%{transform:translateX(-3px)}36%{transform:translateX(3px)}54%{transform:translateX(-2px)}72%{transform:translateX(2px)}88%{transform:translateX(-1px)}}
@keyframes hpShake2{0%,100%{transform:translateX(0)}18%{transform:translateX(-5px)}36%{transform:translateX(5px)}54%{transform:translateX(-4px)}72%{transform:translateX(3px)}88%{transform:translateX(-2px)}}
@keyframes hpShake3{0%,100%{transform:translateX(0)}12%{transform:translateX(-9px)}24%{transform:translateX(9px)}36%{transform:translateX(-7px)}48%{transform:translateX(7px)}60%{transform:translateX(-5px)}72%{transform:translateX(4px)}84%{transform:translateX(-3px)}92%{transform:translateX(2px)}}
@keyframes hpShake4{0%,100%{transform:translateX(0)}10%{transform:translateX(-14px)}20%{transform:translateX(14px)}30%{transform:translateX(-11px)}40%{transform:translateX(11px)}50%{transform:translateX(-8px)}60%{transform:translateX(7px)}70%{transform:translateX(-5px)}80%{transform:translateX(4px)}90%{transform:translateX(-2px)}}
@keyframes lunge{0%{transform:translate(0,0) scale(1)}40%{transform:translate(var(--lx,0px),var(--ly,0px)) scale(1.15)}75%{transform:translate(calc(var(--lx,0px)*.12),calc(var(--ly,0px)*.12)) scale(1.04)}100%{transform:translate(0,0) scale(1)}}
@keyframes deathBurst{
  0%  {transform:translateX(0);opacity:1}
  7%  {transform:translateX(-4px);opacity:1}
  14% {transform:translateX(4px);opacity:1}
  20% {transform:translateX(-4px);opacity:1}
  26% {transform:translateX(3px);opacity:1}
  31% {transform:translateX(-3px);opacity:1}
  36% {transform:translateX(3px);opacity:1}
  40% {transform:translateX(-2px);opacity:1}
  44% {transform:translateX(2px);opacity:1}
  47% {transform:translateX(-2px);opacity:1}
  50% {transform:translateX(2px);opacity:1}
  52% {transform:translateX(-1px);opacity:1}
  54% {transform:translateX(0);opacity:1}
  58% {opacity:.85}
  68% {opacity:.6}
  80% {opacity:.32}
  92% {opacity:.1}
  100%{opacity:0}
}
@keyframes atkJelly{
  0%  {transform:scale(1)}
  20% {transform:scale(1.65,0.6)}
  40% {transform:scale(0.75,1.45)}
  58% {transform:scale(1.3,0.82)}
  72% {transform:scale(0.9,1.15)}
  84% {transform:scale(1.1,0.94)}
  92% {transform:scale(0.97,1.04)}
  100%{transform:scale(1)}
}
@keyframes tauntShield{
  0%  {box-shadow:0 0 0 0 rgba(220,170,30,0),0 0 4px rgba(255,210,60,.4) inset}
  15% {box-shadow:0 0 0 12px rgba(220,170,30,.6),0 0 20px rgba(255,210,60,.8) inset}
  35% {box-shadow:0 0 0 22px rgba(220,170,30,.2),0 0 12px rgba(255,210,60,.5) inset}
  60% {box-shadow:0 0 12px rgba(220,170,30,.5),0 0 6px rgba(255,210,60,.3) inset}
  100%{box-shadow:0 0 12px rgba(220,170,30,.6),0 0 4px rgba(255,210,60,.4) inset}
}
@keyframes minionIn{0%{transform:scale(0) translateY(-32px) rotate(-8deg);opacity:0}60%{transform:scale(1.12) translateY(3px);opacity:1}85%{transform:scale(.97) translateY(-1px)}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes dmgFloat{0%{transform:translateY(0) scale(1.2);opacity:1}55%{opacity:.85}100%{transform:translateY(-70px) scale(.7);opacity:0}}
@keyframes toastIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.88)}10%{opacity:1;transform:translate(-50%,-50%) scale(1)}78%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(.95)}}
@keyframes slotIn{0%{width:0;opacity:0}100%{width:68px;opacity:1}}
@keyframes endPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 28px rgba(160,60,255,.85),0 0 12px rgba(180,80,255,.5),0 0 4px rgba(220,140,255,.3)}}
@keyframes rdyPulse{0%,100%{opacity:.78}50%{opacity:1}}
@keyframes marchDash{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
/* Marching arrow on SVG path */
.arrow-march{stroke-dasharray:14 10;animation:marchDash .55s linear infinite}

.card-fw{animation:floatCard 2.2s ease-in-out infinite;animation-delay:var(--fd,0s)}
/* flyIn with staggered delay --dd for sequential draw animation */
.card-fw.new-card{animation:flyIn .95s cubic-bezier(.15,1.1,.5,1) forwards, floatCard 2.2s ease-in-out infinite;animation-delay:var(--dd,0s),calc(var(--dd,0s) + .95s)}
.minion.lunging{animation:lunge .62s cubic-bezier(.25,0,.6,1) forwards!important;z-index:500!important;isolation:isolate;position:relative}
.minion.dying{animation:deathBurst 1.8s linear forwards!important;pointer-events:none}
.minion.new-summon{animation:minionIn .58s cubic-bezier(.15,1.35,.6,1) both}
.minion.taunt-flash{animation:tauntShield .85s ease-out forwards!important}
/* Draw: existing cards slide smoothly when hand size changes */
.hs{position:absolute;bottom:0;cursor:grab;user-select:none;-webkit-user-select:none;transition:left .28s cubic-bezier(.3,1,.5,1),transform .15s}
.hs:active{cursor:grabbing}
.hs.src-ghost>.card-fw{opacity:.12;filter:grayscale(90%);pointer-events:none!important}
.hs.draw-pending{visibility:hidden;pointer-events:none}
/* flyIn keyframe no longer used on .card-fw — we use JS ghost instead */

/* ── DRAG ── */
#drag-ghost{position:fixed;pointer-events:none;z-index:999;transform:translate(-50%,-65%) rotate(-6deg);opacity:.9}
#deck-ghost{position:fixed;pointer-events:none;z-index:800;transform:translate(-50%,-60%) rotate(-5deg);opacity:.9}
.board-slot-ghost{width:68px;height:88px;border:2px dashed rgba(50,140,255,.38);border-radius:6px;flex-shrink:0;background:rgba(50,130,255,.06);animation:slotIn .18s ease-out}

/* ── DROP HI (enemy minions + hero) ── */
.em,.om{position:relative}
.em.lunging-parent,.om.lunging-parent{z-index:200;isolation:isolate}
/* READY: orange glow – same treatment for minion and hero */
.em.drop-ready .minion{
  border:2px solid rgba(255,148,42,.95)!important;
  box-shadow:0 0 20px rgba(255,148,42,.7),0 0 6px rgba(255,148,42,.4) inset!important;
  animation:rdyPulse .48s ease-in-out infinite;
  outline:none;
}
.em.drop-ready .mn,.em.drop-hi .mn{visibility:hidden}

/* ── LAYOUT ── */
.topbar,.botbar{flex-shrink:0;padding:5px 14px;display:flex;align-items:center;gap:10px;background:#0d0d0d;position:relative;z-index:2}
.topbar{border-bottom:1px solid rgba(40,80,40,.4)}
.botbar{border-top:1px solid rgba(40,80,40,.4)}
/* ── HERO HP BAR ── */
.hp-bar-row{flex-shrink:0;height:40px;display:flex;align-items:center;gap:10px;padding:0 12px;position:relative;z-index:2}
.hp-bar-row.top{background:#0a0a0a;border-bottom:1px solid rgba(40,80,40,.35)}
.hp-bar-row.bot{background:#0a0a0a;border-top:1px solid rgba(40,80,40,.35);border-bottom:3px solid #050505}
.hp-bar-track{flex:1;height:12px;background:linear-gradient(180deg,#0a0a0a 0%,#1a1a1a 40%,#111 100%);border-radius:6px;overflow:hidden;position:relative;border:1px solid #000;box-shadow:0 2px 6px rgba(0,0,0,.8) inset,0 1px 0 rgba(255,255,255,.06)}
.hp-bar-lag{position:absolute;left:0;top:0;height:100%;background:linear-gradient(180deg,rgba(255,190,60,.9) 0%,rgba(210,120,10,.85) 50%,rgba(160,80,0,.7) 100%);border-radius:4px;box-shadow:0 0 6px rgba(255,150,20,.4) inset}
.hp-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;transition:width .55s cubic-bezier(.25,.8,.25,1);box-shadow:0 1px 0 rgba(255,255,255,.18) inset,0 -1px 0 rgba(0,0,0,.35) inset}
.hp-bar-fill.hit{animation:hpFlash .5s ease-out}
.hp-bar-row.shake1{animation:hpShake1 .38s ease-out}
.hp-bar-row.shake2{animation:hpShake2 .45s ease-out}
.hp-bar-row.shake3{animation:hpShake3 .55s ease-out}
.hp-bar-row.shake4{animation:hpShake4 .65s ease-out}
.ai-hand-wrap{flex-shrink:0;height:108px;display:flex;justify-content:center;align-items:flex-start;padding-top:6px;background:#090909;border-bottom:1px solid rgba(40,80,40,.3);overflow:visible;position:relative;z-index:2}
.boards{flex:1;display:flex;flex-direction:column;min-height:0;background:#0c0c0c;position:relative;overflow:visible;z-index:1}
.brow{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 4px;min-height:64px;overflow:visible;position:relative}
.center-div{height:1px;background:#181818;flex-shrink:0;position:relative;z-index:0}
.hand-wrap{flex-shrink:0;height:114px;background:#090909;border-top:1px solid rgba(40,80,40,.3);overflow:visible;display:flex;justify-content:center;align-items:flex-end;padding-bottom:2px;position:relative;z-index:2}
/* Hint BELOW hand-wrap, as separate bar (not inside) */
.hand-hint-bar{flex-shrink:0;height:14px;background:#090909;display:flex;align-items:center;justify-content:center;border-top:1px solid rgba(40,80,40,.2);position:relative;z-index:2}
.hand-hint{font-size:8px;color:#b8a830;letter-spacing:2px;font-family:monospace}

/* ── LOG ── */
.gamelog-wrap{position:absolute;right:8px;top:4px;bottom:4px;width:148px;z-index:10}
.log-btn{width:100%;padding:4px 0;background:#0a0a0a;border:1px solid #1a1a1a;color:#555;font-size:9px;letter-spacing:2px;cursor:pointer;margin-bottom:3px}
.log-btn:hover{color:#888}
.gamelog{height:calc(100% - 26px);background:rgba(0,0,0,.78);border:1px solid #111;padding:6px;overflow-y:auto;font-family:monospace;font-size:9px;display:flex;flex-direction:column;gap:2px}
.gl{border-bottom:1px solid #0a0a0a;padding-bottom:2px;color:#3a3a3a}
.gl.lx{color:#686868}

/* ── TOAST: battlefield center, safe margins ── */
#sc-toast{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);background:rgba(4,4,4,.96);border:1px solid rgba(255,255,255,.08);padding:7px 18px;border-radius:2px;font-size:13px;z-index:1000;pointer-events:none;letter-spacing:1px;white-space:nowrap;animation:toastIn 2.1s ease-out forwards;max-width:calc(100vw - 32px);box-sizing:border-box}
#sc-toast.ok{color:#78e878;border-color:rgba(80,200,80,.3)}
#sc-toast.warn{color:#e8e4d8}
#sc-toast.err{color:#ff7060;border-color:rgba(255,70,60,.3)}
#sc-toast.ai{color:#bb99ff;border-color:rgba(140,80,255,.22)}
.float-dmg{position:fixed;pointer-events:none;z-index:600;font-family:Georgia,serif;font-weight:bold;text-shadow:0 1px 8px rgba(0,0,0,.9);animation:dmgFloat .96s ease-out forwards}
.end-hint{animation:endPulse 1.5s ease-in-out infinite}
/* invalid drag: red border + glow */
.card.invalid-drag{border:2px solid rgba(255,60,60,.9)!important;box-shadow:0 0 20px rgba(255,50,50,.65),0 0 6px rgba(255,50,50,.35) inset!important;animation:none!important}
.minion.invalid-drag{border:2px solid rgba(255,60,60,.9)!important;box-shadow:0 0 18px rgba(255,50,50,.62),0 0 5px rgba(255,50,50,.3) inset!important;animation:none!important}

/* ── ZOOM ── */
#zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.86);display:flex;align-items:center;justify-content:center;z-index:900;cursor:pointer}
@keyframes zoomFloat{0%,100%{transform:scale(2.6) translateY(0)}50%{transform:scale(2.6) translateY(-8px)}}
@keyframes zoomFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── JUNGLE BACKGROUND ── */
.jungle-bg{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.jungle-bg .layer{position:absolute;bottom:0;left:0;width:100%;pointer-events:none}
@keyframes mist{0%,100%{transform:translateX(0);opacity:.55}50%{transform:translateX(18px);opacity:.35}}
@keyframes leafSway{0%,100%{transform-origin:bottom center;transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
@keyframes leafSway2{0%,100%{transform-origin:bottom center;transform:rotate(1deg)}50%{transform:rotate(-2deg)}}
.leaf-sway{animation:leafSway 4s ease-in-out infinite}
.leaf-sway2{animation:leafSway2 5s ease-in-out infinite}
.mist-layer{animation:mist 9s ease-in-out infinite}
/* Battle area backgrounds — semi-transparent over jungle */
.topbar,.botbar{background:rgba(8,12,8,.88)!important}
.hp-bar-row.top{background:rgba(6,10,6,.88)!important}
.hp-bar-row.bot{background:rgba(6,10,6,.92)!important}
.ai-hand-wrap{background:rgba(5,8,5,.82)!important}
.hand-wrap{background:rgba(5,8,5,.85)!important}
.hand-hint-bar{background:rgba(5,8,5,.8)!important}
.boards{background:transparent!important}
.center-div{background:rgba(40,80,40,.25)!important;height:2px!important}
.brow{background:rgba(0,0,0,.08)!important}
.dscreen{min-height:100vh;background:#070707;display:flex;flex-direction:column}
.dhead{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #111;background:#0a0a0a;gap:14px}
.dbody{display:flex;flex:1;overflow:hidden}
.pool{flex:1;overflow-y:auto;padding:16px;background:#080808}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:12px}
.pc{position:relative;cursor:pointer;border-radius:6px;transition:transform .1s}
.pc:hover{transform:translateY(-2px)}
.pc.maxed{cursor:default}
.pc.maxed:hover{transform:none}
.dlist{width:195px;border-left:1px solid #111;background:#090909;display:flex;flex-direction:column;overflow:hidden}
.dlist-head{padding:14px 14px 0;flex-shrink:0;border-bottom:1px solid #2a2a1a}
.dlist-body{flex:1;overflow-y:auto;padding:0 14px 14px}
.di{display:flex;align-items:center;margin-bottom:6px;gap:6px;cursor:grab;padding:4px 3px;border-radius:2px;user-select:none}
.di:hover{background:rgba(255,255,255,.03)}
.di:active{cursor:grabbing}

/* ── MENU ── */
.mbg{min-height:100vh;background:#070707;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.deco{position:absolute;inset:0;opacity:.04;pointer-events:none}
.go{position:absolute;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
/* ── MOBILE COMPACT (short/narrow screens) ── */
@media (max-height: 760px) {
  .topbar,.botbar{padding:3px 10px;gap:6px}
  .ai-hand-wrap{height:72px;padding-top:2px}
  .hand-wrap{height:96px}
  .hand-hint-bar{display:none}
}
@media (max-height: 680px) {
  .ai-hand-wrap{height:58px}
  .hand-wrap{height:86px}
  .brow{padding:2px 6px;gap:4px}
}
/* prevent board minions overflowing on narrow screens */
.brow{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body><div id="root"></div>
<script>
// ══════════════════════════════════════════════════════
// ██████╗ SHADOW CARDS AUDIO ENGINE
// ══════════════════════════════════════════════════════
const Audio={
  ctx:null,masterGain:null,bgmGain:null,sfxGain:null,
  bgmPlaying:false,bgmNodes:[],_nextBeat:0,_schedAhead:.12,_schedInterval:null,
  _beatLen:.0,_seq:[],_seqIdx:0,_started:false,

  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ctx.createGain();this.masterGain.gain.value=.7;
    this.bgmGain=this.ctx.createGain();this.bgmGain.gain.value=.28;
    this.sfxGain=this.ctx.createGain();this.sfxGain.gain.value=.85;
    this.bgmGain.connect(this.masterGain);
    this.sfxGain.connect(this.masterGain);
    this.masterGain.connect(this.ctx.destination);
  },

  // ── Utility ──────────────────────────────────────────
  _osc(type,freq,start,dur,vol=.5,dest=null){
    const g=dest||this.sfxGain;
    const o=this.ctx.createOscillator();
    const a=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,start);
    a.gain.setValueAtTime(0,start);
    a.gain.linearRampToValueAtTime(vol,start+.004);

  // ══ BACKGROUND MUSIC ═════════════════════════════════
  // Mysterious-epic-playful: D minor + chromatic, bouncy rhythm
  startBGM(){
    if(!this.ctx||this.bgmPlaying)return;
    this.bgmPlaying=true;
    const bpm=126;
    this._beatLen=60/bpm;
    this._nextBeat=this.ctx.currentTime+.1;
    this._seqIdx=0;

    // Scale: D minor pentatonic + some chromatic colour
    // Notes as semitones from D3(174.61hz): D=0,F=3,G=5,A=7,C=10,D+12=12,F+=15
    const D3=174.61;
    const note=n=>D3*Math.pow(2,n/12);

    // Melody sequences (4 bar patterns that cycle)
    const melPatterns=[
      // Pattern 0: Main theme - playful & mysterious
      [{n:12,d:1},{n:15,d:.5},{n:14,d:.5},{n:12,d:1},{n:10,d:1},{n:7,d:2},
       {n:10,d:1},{n:12,d:.5},{n:10,d:.5},{n:7,d:1},{n:5,d:1},{n:3,d:2}],
      // Pattern 1: Epic ascending run
      [{n:0,d:.5},{n:3,d:.5},{n:5,d:.5},{n:7,d:.5},{n:10,d:1},{n:12,d:.5},{n:14,d:.5},
       {n:15,d:2},{n:12,d:.5},{n:10,d:.5},{n:7,d:1},{n:5,d:.5},{n:3,d:.5}],
      // Pattern 2: Quirky playful
      [{n:15,d:.25},{n:14,d:.25},{n:15,d:.5},{n:12,d:1},{n:10,d:.25},{n:7,d:.25},
       {n:10,d:.5},{n:12,d:1},{n:7,d:.5},{n:5,d:.5},{n:3,d:.5},{n:5,d:.5},{n:7,d:2}],
    ];
    // Bass pattern (repeating)
    const bassNotes=[0,0,7,10,0,3,5,7].map(n=>note(n)/2);

    let melPat=0,melNote=0,bassIdx=0,beat=0;
    const BEATS_PER_PAT=16;

    const schedule=()=>{
      while(this._nextBeat<this.ctx.currentTime+this._schedAhead){
        const t=this._nextBeat;
        // Bass - every beat
        const bFreq=bassNotes[bassIdx%bassNotes.length];
        const bo=this.ctx.createOscillator();const ba=this.ctx.createGain();
        bo.type="triangle";bo.frequency.value=bFreq;
        ba.gain.setValueAtTime(0,t);ba.gain.linearRampToValueAtTime(.22,t+.01);
        ba.gain.exponentialRampToValueAtTime(.001,t+this._beatLen*.85);
        bo.connect(ba);ba.connect(this.bgmGain);bo.start(t);bo.stop(t+this._beatLen);

        // Sub bass pulse
        const so=this.ctx.createOscillator();const sa=this.ctx.createGain();
        so.type="sine";so.frequency.value=bFreq/2;
        sa.gain.setValueAtTime(.18,t);sa.gain.exponentialRampToValueAtTime(.001,t+this._beatLen*.5);
        so.connect(sa);sa.connect(this.bgmGain);so.start(t);so.stop(t+this._beatLen);

        // Melody - follows rhythm pattern
        const pat=melPatterns[melPat%melPatterns.length];
        const mn=pat[melNote%pat.length];
        const mFreq=note(mn.n);const mDur=mn.d*this._beatLen;
        const mo=this.ctx.createOscillator();const ma=this.ctx.createGain();
        mo.type="sine";mo.frequency.setValueAtTime(mFreq,t);
        ma.gain.setValueAtTime(0,t);ma.gain.linearRampToValueAtTime(.18,t+.015);
        ma.gain.exponentialRampToValueAtTime(.001,t+mDur*.9);
        // Slight vibrato for expression
        const vib=this.ctx.createOscillator();const vibG=this.ctx.createGain();
        vib.frequency.value=5.5;vibG.gain.value=mFreq*.008;
        vib.connect(vibG);vibG.connect(mo.frequency);
        mo.connect(ma);ma.connect(this.bgmGain);
        mo.start(t);mo.stop(t+mDur+.02);
        vib.start(t);vib.stop(t+mDur+.02);

        // Bell/pluck accent every 2 beats for mystery
        if(beat%2===0){
          const bf=note(mn.n+12);
          const bellO=this.ctx.createOscillator();const bellA=this.ctx.createGain();
          bellO.type="sine";bellO.frequency.value=bf;
          bellA.gain.setValueAtTime(.09,t);bellA.gain.exponentialRampToValueAtTime(.001,t+.6);
          bellO.connect(bellA);bellA.connect(this.bgmGain);
          bellO.start(t);bellO.stop(t+.65);
        }

        // Percussion - kick on 1&3, snare-noise on 2&4
        if(beat%4===0||beat%4===2){
          // Kick
          const ko=this.ctx.createOscillator();const ka=this.ctx.createGain();
          ko.type="sine";ko.frequency.setValueAtTime(180,t);
          ko.frequency.exponentialRampToValueAtTime(40,t+.08);
          ka.gain.setValueAtTime(.45,t);ka.gain.exponentialRampToValueAtTime(.001,t+.12);
          ko.connect(ka);ka.connect(this.bgmGain);ko.start(t);ko.stop(t+.14);
        }
        if(beat%4===1||beat%4===3){
          // Hi-hat / snare-like
          const hBuf=this.ctx.createBuffer(1,Math.ceil(this.ctx.sampleRate*.05),this.ctx.sampleRate);
          const hd=hBuf.getChannelData(0);for(let i=0;i<hd.length;i++)hd[i]=Math.random()*2-1;
          const hSrc=this.ctx.createBufferSource();hSrc.buffer=hBuf;
          const hf=this.ctx.createBiquadFilter();hf.type="highpass";hf.frequency.value=4000;
          const ha=this.ctx.createGain();ha.gain.setValueAtTime(.14,t);ha.gain.exponentialRampToValueAtTime(.001,t+.05);
          hSrc.connect(hf);hf.connect(ha);ha.connect(this.bgmGain);
          hSrc.start(t);hSrc.stop(t+.06);
        }

        // Advance sequencer
        melNote++;beat++;bassIdx++;
        if(melNote>=pat.length){melNote=0;if(beat%(BEATS_PER_PAT)===0)melPat++;}
        this._nextBeat+=this._beatLen;
      }
    };
    schedule();
    this._schedInterval=setInterval(schedule,50);
  },

  stopBGM(){
    if(!this.bgmPlaying)return;
    this.bgmPlaying=false;
    clearInterval(this._schedInterval);
    if(this.bgmGain)this.bgmGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+.5);
    setTimeout(()=>{if(this.bgmGain)this.bgmGain.gain.value=.28;},600);
  },

  setVolume(v){if(this.masterGain)this.masterGain.gain.value=v;},
  mute(){this.setVolume(0);},
  unmute(){this.setVolume(.7);},
  _start(){if(!this._started){this._started=true;this.init();this.startBGM();}},
};

// AI strategy functions
function aiBasic(s){
  // Lv1: Play highest-cost available, attack lowest HP enemy (random-ish)
  return _buildScript(s,{playOrder:"highcost",target:"lowest",spellSmart:false});
}
function aiHunter(s){
  // Lv2: Play highest cost, attack lowest HP, basic spell targeting
  return _buildScript(s,{playOrder:"highcost",target:"lowest",spellSmart:true,faceIfClear:true});
}
function aiMage(s){
  // Lv3: Prefer spells, target to kill if possible
  return _buildScript(s,{playOrder:"spellsfirst",target:"killshot",spellSmart:true,faceIfClear:true,saveRemoval:false});
}
function aiGeneral(s){
  // Lv4: Taunt/rally synergy, protect board, trade efficiently
  return _buildScript(s,{playOrder:"tauntrally",target:"efficient",spellSmart:true,faceIfClear:true,saveRemoval:true});
}
function aiChaos(s){
  // Lv5: Full optimal - killshot > face if lethal > efficient trade
  return _buildScript(s,{playOrder:"optimal",target:"optimal",spellSmart:true,faceIfClear:true,saveRemoval:true,goForLethal:true});
}

function _buildScript(s0,opts){
  const script=[];let sim={...s0};
  let played=true;
  while(played&&!sim.over){
    played=false;
    const ai=sim.ai,opts2=ai.hand.map((c,i)=>({c,i})).filter(({c})=>c.cost<=ai.mana);
    if(!opts2.length)break;
    let minions=opts2.filter(({c})=>c.type==="minion"&&ai.board.length<7);
    let spells=opts2.filter(({c})=>c.type==="spell");
    // Ordering strategy
    let pk=null;
    if(opts.playOrder==="spellsfirst"){
      pk=spells.sort((a,b)=>b.c.cost-a.c.cost)[0]||minions.sort((a,b)=>b.c.cost-a.c.cost)[0];
    }else if(opts.playOrder==="tauntrally"){
      const tauntFirst=minions.filter(({c})=>c.taunt).sort((a,b)=>b.c.cost-a.c.cost);
      const rallyFirst=minions.filter(({c})=>c.effect==="rally"&&ai.board.length>0);
      pk=tauntFirst[0]||rallyFirst[0]||minions.sort((a,b)=>b.c.cost-a.c.cost)[0]||spells.sort((a,b)=>b.c.cost-a.c.cost)[0];
    }else if(opts.playOrder==="optimal"){
      // Save AoE/removal for full boards; prefer rally if we have minions
      const hasEnemyBoard=sim.player.board.length>=3;
      const aoeSpells=spells.filter(({c})=>c.effect==="aoe");
      const rallyMinion=minions.filter(({c})=>c.effect==="rally"&&ai.board.length>0);
      if(hasEnemyBoard&&aoeSpells.length)pk=aoeSpells[0];
      else pk=rallyMinion[0]||minions.sort((a,b)=>b.c.cost-a.c.cost)[0]||spells.sort((a,b)=>b.c.cost-a.c.cost)[0];
    }else{
      pk=minions.sort((a,b)=>b.c.cost-a.c.cost)[0]||spells.sort((a,b)=>b.c.cost-a.c.cost)[0];
    }
    if(!pk)break;
    const sb=sim;let newSumUid=null,spellTarget=null;
    if(pk.c.type==="minion"){
      sim=playM(sim,pk.i,"ai");
      const added=sim.ai.board.find(m=>!sb.ai.board.find(b=>b.uid===m.uid));
      if(added){newSumUid=added.uid;if(pk.c.effect==="rally"){sim={...sim,ai:{...sim.ai,board:sim.ai.board.map(m=>m.uid===added.uid?m:{...m,atkBuff:(m.atkBuff||0)+1,atk:m.atk+1})}};}}
    }else{
      const{c,i}=pk;let tw="player",ti=-1;
      if(c.effect==="dmg"||c.effect==="drain"){
        const pb=sim.player.board;
        if(opts.target==="killshot"||opts.target==="optimal"){
          // Kill exact if possible, else hit face or weakest
          const killIdx=pb.findIndex(m=>m.curHp<=c.val);
          if(killIdx>=0){ti=killIdx;}
          else if(opts.faceIfClear&&!pb.length){ti=-1;}
          else{ti=pb.length?pb.reduce((mi,m,ii)=>m.curHp<pb[mi].curHp?ii:mi,0):-1;}
        }else{ti=pb.length?pb.reduce((mi,m,ii)=>m.curHp<pb[mi].curHp?ii:mi,0):-1;}
      }else if(c.effect==="heal"){tw="ai";}
      else if(c.effect==="aoe"){tw="player";ti=-2;}
      spellTarget=(c.effect==="dmg"||c.effect==="drain")?{tw,ti,val:c.val}:c.effect==="aoe"?{tw:"player",ti:-2,val:c.val}:null;
      sim=castS(sim,i,"ai",tw,ti);
    }
    script.push({type:"play",sb,sa:sim,card:pk.c,newSumUid,spellTarget});played=true;
  }
  // Attack phase
  const auids=sim.ai.board.filter(m=>!m.sick&&!m.attacked).map(m=>m.uid);
  for(const auid of auids){
    if(sim.over)break;
    const bi=sim.ai.board.findIndex(m=>m.uid===auid);if(bi<0)continue;
    const atkr=sim.ai.board[bi];const pb=sim.player.board;
    const tauntMins=pb.filter(m=>m.taunt);
    let ti;
    if(tauntMins.length>0){ti=pb.findIndex(m=>m.taunt);}
    else if(opts.target==="efficient"||opts.target==="optimal"){
      // Trade into something we can kill; else go face
      const killIdx=pb.findIndex(m=>m.curHp<=atkr.atk);
      if(killIdx>=0)ti=killIdx;
      else if(opts.faceIfClear)ti=pb.length?pb.reduce((mi,m,ii)=>m.curHp<pb[mi].curHp?ii:mi,0):-1;
      else ti=pb.length?pb.reduce((mi,m,ii)=>m.curHp<pb[mi].curHp?ii:mi,0):-1;
    }else{
      ti=pb.length?pb.reduce((mi,m,ii)=>m.curHp<pb[mi].curHp?ii:mi,0):-1;
    }
    // Lv5: go face if can lethal
    if(opts.goForLethal&&ti!==-1&&sim.player.hp<=atkr.atk){ti=-1;}
    const sb=sim,def=ti===-1?null:sim.player.board[ti];
    sim=atkF(sim,"ai",bi,"player",ti);
    script.push({type:"atk",bi,ti,atkrUid:atkr.uid,defUid:def?.uid,atkDmg:atkr.atk,defDmg:def?def.atk:0,sb,sa:sim});
  }
  return{script,finalState:sim};
}

let _u=0;const uid=()=>++_u;
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const mk=def=>({...def,uid:uid(),curHp:def.hp||0,sick:true,attacked:false});
const alog=(s,m)=>({...s,log:[m,...s.log.slice(0,29)]});
const chk=s=>{
  if(s.player.hp<=0&&s.ai.hp<=0)return{...s,over:"draw"};
  if(s.player.hp<=0){setTimeout(()=>Audio.sfxDefeat(),300);return{...s,over:"lose"};}
  if(s.ai.hp<=0){setTimeout(()=>Audio.sfxVictory(),300);return{...s,over:"win"};}
  return s;
};
const draw1=(s,who)=>{const p=s[who];if(!p.deck.length){return chk(alog({...s,[who]:{...p,hp:p.hp-5}},"💀"+(who==="player"?"你":"AI")+"牌庫空-5HP"));}const[d,...rest]=p.deck;if(p.hand.length>=10)return alog({...s,[who]:{...p,deck:rest}},d.name+"燒毀");return who==="player"?alog({...s,[who]:{...p,deck:rest,hand:[...p.hand,d]},lastDraws:[...(s.lastDraws||[]),d.uid]},"🃏抽："+d.name):{...s,[who]:{...p,deck:rest,hand:[...p.hand,d]},aiNewCard:true};};
const startT=(s0,who)=>{const p=s0[who],nm=Math.min(10,p.maxMana+1);let s={...s0,[who]:{...p,maxMana:nm,mana:nm,board:p.board.map(m=>({...m,sick:false,attacked:false}))},turn:who,mode:"default",selCard:null,selAtk:null,lastDraws:[],aiNewCard:false};s=draw1(s,who);if(!s.over)s=alog(s,"━━"+(who==="player"?"你的回合":"電腦回合")+"━━");
// Turn notification: "你的回合" when it's the LOCAL player's turn
const isMyTurn=(who==="player"&&!MP)||(who==="player"&&MP?.role==="host")||(who==="ai"&&MP?.role==="guest");
if(isMyTurn)setTimeout(()=>Audio.sfxTurnStart(),200);
return s;};
const playM=(s0,hi,who)=>{const p=s0[who],c=p.hand[hi];if(!c||c.type!=="minion"||p.mana<c.cost||p.board.length>=7)return s0;const mn={...c,uid:uid(),curHp:c.hp,sick:true,attacked:false};return alog({...s0,[who]:{...p,mana:p.mana-c.cost,hand:p.hand.filter((_,i)=>i!==hi),board:[...p.board,mn]}},"⚔️"+(who==="player"?"你":"AI")+"召："+c.name);};
const castS=(s0,hi,who,tw,ti)=>{
  const p=s0[who],c=p.hand[hi];
  if(!c||c.type!=="spell"||p.mana<c.cost)return s0;
  let s={...s0,[who]:{...p,mana:p.mana-c.cost,hand:p.hand.filter((_,i)=>i!==hi)}};
  const{effect:ef,val:v}=c;
  if(ef==="aoe"){
    // Hit all enemy minions + hero
    let bd=[...s[tw].board];
    bd=bd.map(m=>({...m,curHp:m.curHp-v})).filter(m=>m.curHp>0);
    s={...s,[tw]:{...s[tw],board:bd,hp:s[tw].hp-v}};
    s=alog(s,"✵"+c.name+"→全場-"+v);
  }else if(ef==="random_destroy"){
    // Random destroy: pick from all minions on both sides
    const all=[];
    s.player.board.forEach((_,i)=>all.push({side:"player",i}));
    s.ai.board.forEach((_,i)=>all.push({side:"ai",i}));
    if(all.length>0){
      const pick=all[0|Math.random()*all.length];
      const victim=s[pick.side].board[pick.i];
      s={...s,[pick.side]:{...s[pick.side],board:s[pick.side].board.filter((_,i)=>i!==pick.i)}};
      s=alog(s,"⚖"+c.name+"→隨從消滅");
    }else s=alog(s,"⚖"+c.name+"→無目標");
  }else if(ef==="dmg"){
    if(ti===-2){
      // all targets — hit all enemy minions + enemy hero
      let bd=[...s[tw].board];
      bd=bd.map(m=>({...m,curHp:m.curHp-v})).filter(m=>m.curHp>0);
      s={...s,[tw]:{...s[tw],board:bd,hp:s[tw].hp-v}};
      s=alog(s,"✨"+c.name+"→全場-"+v);
    }else if(ti===-1){
      s={...s,[tw]:{...s[tw],hp:s[tw].hp-v}};s=alog(s,"✨"+c.name+"→英雄-"+v);
    }else{
      const h=s[tw].board[ti];
      s={...s,[tw]:{...s[tw],board:s[tw].board.map((m,i)=>i===ti?{...m,curHp:m.curHp-v}:m).filter(m=>m.curHp>0)}};
      s=alog(s,"✨"+c.name+"→"+h.name+"-"+v);
    }
  }else if(ef==="heal"){
    // Fix 2+3: heal self only (caster's hero recovers hp)
    s={...s,[who]:{...s[who],hp:Math.min(50,s[who].hp+v)}};
    s=alog(s,"💚"+c.name+"+"+v);
  }else if(ef==="draw"){
    s=alog(s,"📚"+c.name+"抽"+v);
    for(let i=0;i<v;i++){s=draw1(s,who);if(s.over)break;}
  }else if(ef==="drain"){
    let d=v;
    if(ti===-1){s={...s,[tw]:{...s[tw],hp:s[tw].hp-v}};}
    else{d=Math.min(v,s[tw].board[ti].curHp);s={...s,[tw]:{...s[tw],board:s[tw].board.map((m,i)=>i===ti?{...m,curHp:m.curHp-v}:m).filter(m=>m.curHp>0)}};}
    s={...s,[who]:{...s[who],hp:Math.min(50,s[who].hp+d)}};s=alog(s,"🔮吸"+d);
  }
  return chk(s);
};
const atkF=(s0,who,ai,tw,ti)=>{const a=s0[who].board[ai];if(!a||a.sick||a.attacked)return s0;if(ti===-1){let s={...s0,[who]:{...s0[who],board:s0[who].board.map((m,i)=>i===ai?{...m,attacked:true}:m)},[tw]:{...s0[tw],hp:s0[tw].hp-a.atk}};return chk(alog(s,"⚔️"+a.name+"→英雄-"+a.atk));}const d=s0[tw].board[ti];let s={...s0,[who]:{...s0[who],board:s0[who].board.map((m,i)=>i===ai?{...m,attacked:true,curHp:a.curHp-d.atk}:m).filter(m=>m.curHp>0)},[tw]:{...s0[tw],board:s0[tw].board.map((m,i)=>i===ti?{...m,curHp:d.curHp-a.atk}:m).filter(m=>m.curHp>0)}};return chk(alog(s,"⚔️"+a.name+"("+a.atk+")vs"+d.name+"("+d.atk+")"));};

function computeAiScript(s){
  return _buildScript(s,{playOrder:"tauntrally",target:"efficient",spellSmart:true,faceIfClear:true,saveRemoval:true});
}
function executeAiScript(script,idx,onDone){
  if(idx>=script.length||GAME.over){onDone();return;}
  const step=script[idx];const next=()=>executeAiScript(script,idx+1,onDone);
  if(step.type==="play"){
    if(step.card.type==="minion"&&step.newSumUid){
      const aiHandWrap=document.querySelector(".ai-hand-wrap");
      const abRow=document.getElementById("ab");
      if(aiHandWrap&&abRow){

function renderOpponentPresence(){
  // Card drag ghost — positioned at TOP (opponent's hand area from viewer's perspective)
  let dragEl=document.getElementById("opp-drag");
  const p=_opponentPresence;
  if(!p||p.type!=="drag"){
    if(dragEl)dragEl.remove();
  }else{
    // Show card back in the AI hand area (top of screen), anchored to opponent's hand
    // Use relative horizontal position mapped to our screen width
    const sw=window.innerWidth;
    // Opponent drags from bottom: map their x to our screen proportionally
    const mirrorX=sw-(p.x/sw)*sw; // mirror horizontally
    // Pin vertically to AI hand area (top ~10-20% of screen height)
    const aiHand=document.querySelector(".ai-hand-wrap");
    const aiHandY=aiHand?aiHand.getBoundingClientRect().top+aiHand.getBoundingClientRect().height/2:80;
    if(!dragEl){
      dragEl=document.createElement("div");dragEl.id="opp-drag";
      dragEl.style.cssText="position:fixed;pointer-events:none;z-index:850;transition:left .1s linear";
      document.body.appendChild(dragEl);
    }
    dragEl.style.left=(mirrorX-30)+"px";dragEl.style.top=(aiHandY-40)+"px";
    dragEl.innerHTML=cardBackSvg();
  }

  // Opponent arrow
  let arrEl=document.getElementById("opp-arrow");
  if(!p||p.type!=="arrow"){
    if(arrEl)arrEl.remove();
  }else{
    if(!arrEl){
      arrEl=document.createElement("div");arrEl.id="opp-arrow";
      arrEl.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:840";
      document.body.appendChild(arrEl);
    }
    // Mirror arrow: flip x (screenW-x) and y (screenH-y) for both points
    const sw=window.innerWidth,sh=window.innerHeight;
    const fx2=sw-p.fx,fy2=sh-p.fy,tx2=sw-p.tx,ty2=sh-p.ty;
    const col=p.ready?"rgba(255,148,42,.85)":"rgba(255,148,42,.5)";
    const dx=tx2-fx2,dy=ty2-fy2,len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/len,ny=dy/len;
    const ex=tx2-nx*18,ey=ty2-ny*18;
    arrEl.innerHTML=`<svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="oa" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <polygon points="0,0 8,4 0,8" fill="${col}"/></marker></defs>
      <line x1="${fx2}" y1="${fy2}" x2="${ex}" y2="${ey}" stroke="${col}" stroke-width="3" stroke-linecap="round" marker-end="url(#oa)" opacity=".8"/>
    </svg>`;
  }

  // Opponent attack animation
  if(p?.type==="attack"&&p.ts&&Date.now()-p.ts<2000){
    // Play attack animation from opponent's perspective on our board
    // bi = attacker index on opponent board (our enemy board)
    // tw="ai" = opponent targeting us → their attacker on em, our minion on om or ah
    const isGuest=MP?.role==="guest";
    // From our view: opponent's attacker is on .em (top), target is on .om or our hp bar
    setTimeout(()=>{
      const atkEl=document.querySelector(`.em[data-ei="${p.bi}"] .minion`)||document.querySelector(`.em[data-ei="${p.bi}"]`);
      let defEl;
      if(p.ti===-1){defEl=document.getElementById("ph");}
      else{defEl=document.querySelector(`.om[data-oi="${p.ti}"] .minion`)||document.querySelector(`.om[data-oi="${p.ti}"]`);}
      if(atkEl&&defEl){
        Audio.sfxMinionAttack();
        // Simple visual flash on defender
        if(defEl){defEl.style.animation="none";void defEl.offsetWidth;defEl.style.animation="rdyPulse .3s ease-out 2";}
        if(p.ti===-1)shakeHpBar("player",Math.abs(p.atkDmg||2));
        else shakeHpBar("player",Math.abs(p.atkDmg||2));
        if(p.defDmg&&p.defDmg>0)shakeHpBar("ai",p.defDmg);
        if(p.atkDmg)setTimeout(()=>{
          if(atkEl)floatDmg(atkEl.getBoundingClientRect().left+atkEl.getBoundingClientRect().width/2,atkEl.getBoundingClientRect().top,Math.abs(p.defDmg||0));
          if(defEl)floatDmg(defEl.getBoundingClientRect().left+defEl.getBoundingClientRect().width/2,defEl.getBoundingClientRect().top,Math.abs(p.atkDmg||0));
        },120);
      }
    },80);
  }
}

// Host applies guest's action to the AI side of GAME
function mpApplyGuestAction(a){
  if(!GAME||GAME.turn!=="ai")return;
  const g=GAME;
  let ng=null;

  if(a.t==="HC"){
    const c=g.ai.hand[a.i];if(!c||c.cost>g.ai.mana)return;
    if(c.type==="minion"){
      if(g.ai.board.length>=7)return;
      const mn={...c,uid:uid(),curHp:c.hp,sick:true,attacked:false};
      let board=[...g.ai.board,mn];
      if(c.effect==="rally")board=board.map(m=>({...m,atk:m.atk+1,atkBuff:(m.atkBuff||0)+1}));
      ng={...g,ai:{...g.ai,mana:g.ai.mana-c.cost,hand:g.ai.hand.filter((_,i)=>i!==a.i),board}};
    }else if(c.effect==="draw"||c.effect==="heal"||c.effect==="aoe"||c.effect==="random_destroy"){
      const tw=c.effect==="aoe"?"player":"ai";
      const ti=c.effect==="aoe"?-2:-1;
      ng={...castS(g,a.i,"ai",tw,ti)};
    }else{
      // Targeted spell — guest will send a follow-up SPELL_TGT action
      ng={...g,ai:{...g.ai},_guestSpellIdx:a.i};
    }
  }
  else if(a.t==="HC_AT"){
    const c=g.ai.hand[a.i];if(!c||c.cost>g.ai.mana||c.type!=="minion"||g.ai.board.length>=7)return;
    const slot=Math.min(Math.max(0,a.slot??g.ai.board.length),g.ai.board.length);
    const mn={...c,uid:uid(),curHp:c.hp,sick:true,attacked:false};
    const board=[...g.ai.board];board.splice(slot,0,mn);
    let nb=[...board];if(c.effect==="rally")nb=nb.map(m=>({...m,atk:m.atk+1,atkBuff:(m.atkBuff||0)+1}));
    ng={...g,ai:{...g.ai,mana:g.ai.mana-c.cost,hand:g.ai.hand.filter((_,i)=>i!==a.i),board:nb}};
  }
  else if(a.t==="BOARD_ATK"){
    // In guest view: tw:"ai"=host(player), tw:"player"=guest(ai)
    const realTw=a.tw==="ai"?"player":"ai";
    const realTi=a.ti;
    const atkr=g.ai.board[a.bi];if(!atkr||atkr.sick||atkr.attacked)return;
    const def=realTi===-1?null:g[realTw].board[realTi];
    ng=atkF(g,"ai",a.bi,realTw,realTi);
    // Trigger visual death anims
    const nsCheck=ng;
    setTimeout(()=>{
      const atkDies=!nsCheck.ai.board.find(m=>m.uid===atkr.uid);
      const defDies=def&&!nsCheck[realTw].board.find(m=>m.uid===def.uid);
      if(atkDies||defDies){
        // Find elements and animate
        if(atkDies){const el=document.querySelector(`.om[data-oi="${a.bi}"] .minion`)||document.querySelector(`.om[data-oi="${a.bi}"]`);if(el)playDeathAnim(el);}
        if(defDies&&realTw==="player"){const el=document.querySelector(`.em[data-ei="${realTi}"] .minion`)||document.querySelector(`.em[data-ei="${realTi}"]`);if(el)playDeathAnim(el);}
      }
    },120);
  }
  else if(a.t==="SPELL_TGT"){
    // Guest targeted spell: a.ci=cardIdx in guest's hand (=GAME.ai.hand)
    // a.tw="ai" means guest's enemy (=server's player), a.tw="player" means guest's own (=server's ai)
    const realTw=a.tw==="ai"?"player":"ai";
    const ci=a.ci;
    const c=(GAME.ai.hand||[])[ci];if(!c)return;
    ng={...castS(g,ci,"ai",realTw,a.ti)};
  }
  else if(a.t==="ET"){
    ng={...startT({...g,turn:"ai",mode:"default",selCard:null,selAtk:null},"player")};
    // Guest ended turn — now it's host's turn
    GAME=ng;
    mpSave();
    render();
    return;
  }
  else if(a.t==="CL"){
    ng={...g,selCard:null,selAtk:null,mode:"default"};
  }

  if(ng){GAME=ng;mpSave();render();}
}

// ── MP ANIMATION DIFF ENGINE ────────────────────────────────────────────────
// Phase 1 (before render): only death anims — uses body-fixed clones, survives DOM rebuild
// Phase 2 (after render): HP bars, floatDmg, sounds, summon effects — needs new DOM
function mpAnimateDiff(oldG,newG,doAfter){
  if(!oldG||!newG)return;
  const isGuest=MP?.role==="guest";
  const ownSide=isGuest?"ai":"player";
  const oppSide=isGuest?"player":"ai";

  // ── PHASE 1: Death animations on OLD DOM (body-fixed clones) ──────────────
  const deaths=[];
  (oldG[oppSide].board||[]).forEach((oldM,i)=>{
    if(!(newG[oppSide].board||[]).find(m=>m.uid===oldM.uid)){
      const el=document.querySelector(`.em[data-ei="${i}"] .minion`)||document.querySelector(`.em[data-ei="${i}"]`);
      if(el){Audio.sfxMinionDeath();playDeathAnim(el);deaths.push({side:"opp",i,hp:oldM.curHp});}
    }
  });
  (oldG[ownSide].board||[]).forEach((oldM,i)=>{
    if(!(newG[ownSide].board||[]).find(m=>m.uid===oldM.uid)){
      const el=document.querySelector(`.om[data-oi="${i}"] .minion`)||document.querySelector(`.om[data-oi="${i}"]`);
      if(el){Audio.sfxMinionDeath();playDeathAnim(el);deaths.push({side:"own",i,hp:oldM.curHp});}
    }
  });

  // ── Delay render if deaths need to animate ────────────────────────────────
  const deathDelay=deaths.length>0?1800:0;

  const phase2=()=>{
    // ── PHASE 2: Everything else on NEW DOM ────────────────────────────────
    // HP bar animations — lagHp was already set before render, updateLagBars handles it
    requestAnimationFrame(()=>{
      updateLagBars();// Force immediate HP animation update

      // floatDmg on surviving minions that took damage
      (newG[oppSide].board||[]).forEach(newM=>{
        const oldM=(oldG[oppSide].board||[]).find(m=>m.uid===newM.uid);
        if(oldM&&newM.curHp<oldM.curHp){
          const idx=(newG[oppSide].board||[]).findIndex(m=>m.uid===newM.uid);
          const el=document.querySelector(`.em[data-ei="${idx}"] .minion`)||document.querySelector(`.em[data-ei="${idx}"]`);
          if(el){const r=el.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,oldM.curHp-newM.curHp);}
        }
      });
      (newG[ownSide].board||[]).forEach(newM=>{
        const oldM=(oldG[ownSide].board||[]).find(m=>m.uid===newM.uid);
        if(oldM&&newM.curHp<oldM.curHp){
          const idx=(newG[ownSide].board||[]).findIndex(m=>m.uid===newM.uid);
          const el=document.querySelector(`.om[data-oi="${idx}"] .minion`)||document.querySelector(`.om[data-oi="${idx}"]`);
          if(el){const r=el.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,oldM.curHp-newM.curHp);}
        }
      });

      // HP floatDmg on hero bars
      const ownHpOld=oldG[ownSide].hp,ownHpNew=newG[ownSide].hp;
      const oppHpOld=oldG[oppSide].hp,oppHpNew=newG[oppSide].hp;
      if(ownHpNew<ownHpOld){floatDmgBar("ph",ownHpOld-ownHpNew,false);}
      if(oppHpNew<oppHpOld){floatDmgBar("ah",oppHpOld-oppHpNew,false);}

      // New minion summon effects
      (newG[ownSide].board||[]).forEach(newM=>{
        if(!(oldG[ownSide].board||[]).find(m=>m.uid===newM.uid)){
          Audio.sfxMinionSummon();
          if(newM.taunt){
            setTimeout(()=>{
              Audio.sfxTauntSummon();
              document.querySelectorAll(".om .minion").forEach(el=>{
                el.classList.add("taunt-flash");setTimeout(()=>el.classList.remove("taunt-flash"),880);
              });
            },600);
          }
          if(newM.effect==="rally"&&(newG[ownSide].board||[]).length>1){
            setTimeout(()=>{
              Audio.sfxRallyTrigger();
              document.querySelectorAll(".om .atk-tri").forEach((tri,i)=>{
                setTimeout(()=>{Audio.sfxRallyBuff();tri.style.animation="none";void tri.offsetWidth;tri.style.animation="atkJelly .55s cubic-bezier(.3,1.4,.5,1)";},i*140);
              });
            },450);
          }
        }
      });
      (newG[oppSide].board||[]).forEach(newM=>{
        if(!(oldG[oppSide].board||[]).find(m=>m.uid===newM.uid)){
          Audio.sfxMinionSummon();
          if(newM.taunt)setTimeout(()=>Audio.sfxTauntSummon(),600);
        }
      });

      // Spell audio (detect by mana + hand changes)
      const ownManaOld=oldG[ownSide].mana,ownManaNew=newG[ownSide].mana;
      const oppManaOld=oldG[oppSide].mana,oppManaNew=newG[oppSide].mana;
      const oppHandOld=(oldG[oppSide].hand||[]).length,oppHandNew=(newG[oppSide].hand||[]).length;
      if(oppHandNew<oppHandOld&&oppManaNew<oppManaOld){Audio.sfxSpellCast();}

      // Turn change
      if(oldG.turn!==newG.turn){
        const myTurnNow=(newG.turn===ownSide);
        if(myTurnNow){setTimeout(()=>Audio.sfxTurnStart(),200);toast("你的回合！","ok");}
        else Audio.sfxTurnStartAI();
      }
    });
  };

  if(doAfter)doAfter(deathDelay,phase2);
}

function createMpRoom(){

    MP={role:"host",roomCode:code};
    showWaitingRoom(code,name);
    // Set disconnect cleanup
    db().ref(`rooms/${code}/connected/host`).set(true);
    db().ref(`rooms/${code}/connected/host`).onDisconnect().remove();
    // Listen for guest joining
    db().ref(`rooms/${code}/status`).on("value",snap=>{
      if(snap.val()==="playing"){

          const d=s.val();
          if(d?.guestDeck)startMpGame("host",code,MP_DECK,d.guestDeck);

    if(!d||d.status!=="waiting"){toast("此房間已開始或不存在","err");return;}

// ── MP Game Start ───────────────────────────────────────────────────────────
function startMpGame(role,code,hostDeckIds,guestDeckIds){
  MP={role,roomCode:code,myDeckIds:role==="host"?hostDeckIds:guestDeckIds};

  // Items 6-7: Disconnect detection
  const oppRole=role==="host"?"guest":"host";
  let disconnectHandled=false;
  db().ref(`rooms/${code}/connected/${oppRole}`).on("value",snap=>{
    // Only react after game has started (opponent was connected at least once)
    if(snap.val()!==null){
      // Opponent was seen connected — from now on watch for removal
      db().ref(`rooms/${code}/connected/${oppRole}`).once("value",()=>{}).catch(()=>{});
      return;
    }
    if(disconnectHandled||!GAME||GAME.over)return;
    disconnectHandled=true;
    if(role==="host"){
      toast("對手已離開，你獲得勝利！","ok");
      GAME={...GAME,over:"win"};render();
      setTimeout(()=>{try{db().ref(`rooms/${code}`).remove();}catch(e){}mpCleanup();SCR="menu";render();},3000);
    }else{
      toast("房主已離開，你獲得勝利！","ok");
      GAME={...GAME,over:"win"};render();
      setTimeout(()=>{mpCleanup();showLobby();},3000);
    }
  });
  if(role==="host"){
    // Host creates initial GAME
    const pd=shuf(hostDeckIds).map(id=>mk(getDef(id)));
    const ad=shuf(guestDeckIds).map(id=>mk(getDef(id)));
    const ph=pd.splice(0,2),ah=ad.splice(0,2);
    let s={player:{hp:50,mana:0,maxMana:0,deck:pd,hand:ph,board:[]},ai:{hp:50,mana:0,maxMana:0,deck:ad,hand:ah,board:[]},turn:"player",mode:"default",selCard:null,selAtk:null,log:["多人對戰！先手開始。"],over:null,lastDraws:[],aiNewCard:false};
    s=startT(s,"player");
    GAME=s;
    SCR="battle";stopFireflies();render();
    db().ref(`rooms/${code}/game`).set(JSON.stringify(GAME));
    mpListenPresence(code);
    // Listen for guest actions
    db().ref(`rooms/${code}/guestAction`).on("value",snap=>{
      const v=snap.val();if(!v?.data||!GAME||GAME.turn!=="ai")return;
      const action=JSON.parse(v.data);
      db().ref(`rooms/${code}/guestAction`).remove();
      mpApplyGuestAction(action);
    });
  }else{
    // Guest listens for game state
    GAME=null;SCR="battle";stopFireflies();render();
    mpListenPresence(code);
    db().ref(`rooms/${code}/game`).on("value",snap=>{
      const v=snap.val();if(!v)return;
      const newG=JSON.parse(v);
      if(!GAME){GAME=newG;guestUI={selAtk:null,selCard:null,mode:"default"};render();return;}

      const oldG=GAME; // capture before mutation
      // Set lagHp BEFORE render so updateLagBars animates correctly
      const isGuest=MP?.role==="guest";
      const ownSide=isGuest?"ai":"player";
      const oppSide=isGuest?"player":"ai";
      if(newG[ownSide].hp<(oldG[ownSide].hp||50))lagHp["player"]=oldG[ownSide].hp;
      if(newG[oppSide].hp<(oldG[oppSide].hp||50))lagHp["ai"]=oldG[oppSide].hp;

      // Find new summons for minionIn animation
      const newSummons=(newG[ownSide].board||[]).filter(newM=>!(oldG[ownSide].board||[]).find(m=>m.uid===newM.uid));
      if(newSummons.length)newSummonUid=newSummons[0].uid;

      // Phase 1 (old DOM): death animations + collect afterFn
      mpAnimateDiff(oldG,newG,(deathDelay,phase2)=>{
        const doRender=()=>{
          GAME=newG;
          guestUI={selAtk:null,selCard:null,mode:"default"};
          render();
          // Phase 2 (new DOM): HP bars, floatDmg, sounds, summon effects
          setTimeout(phase2,80);
          // Clear summonUid after animation
          if(newSummons.length)setTimeout(()=>{newSummonUid=null;},700);
        };
        if(deathDelay>0)setTimeout(doRender,deathDelay);else doRender();
      });
    });
  }
}

function animFlyIntoSlot(uid, delay){
  setTimeout(()=>{
    const slotEl=document.querySelector(`.hs[data-uid="${uid}"]`);
    if(!slotEl)return;
    const sr=slotEl.getBoundingClientRect();
    const destX=sr.left,destY=sr.top;

    const ghost=document.createElement("div");
    ghost.style.cssText=`position:fixed;left:${window.innerWidth+20}px;top:${destY}px;pointer-events:none;z-index:850;transition:none;opacity:0.95`;
    ghost.innerHTML=slotEl.innerHTML; // same card content
    document.body.appendChild(ghost);

    // Kick off: slide in
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      ghost.style.transition=`left .55s cubic-bezier(.15,1,.4,1),top .4s cubic-bezier(.3,1,.5,1),transform .55s cubic-bezier(.15,1,.4,1)`;
      ghost.style.left=destX+"px";
      ghost.style.top=destY+"px";
      ghost.style.transform="rotate(0deg)";
    }));

    // Land: show real slot, remove ghost
    setTimeout(()=>{
      slotEl.classList.remove("draw-pending");
      ghost.style.transition="opacity .12s";
      ghost.style.opacity="0";
      setTimeout(()=>ghost.remove(),130);
    },570);
  }, delay);

// Play death animation on a body-fixed clone so render() doesn't kill it mid-animation
function playDeathAnim(el){
  if(!el)return;
  Audio.sfxMinionDeath();
  const r=el.getBoundingClientRect();
  const clone=el.cloneNode(true);
  clone.className="minion";
  clone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;pointer-events:none;z-index:8000;`;
  clone.querySelectorAll("*").forEach(c=>{c.style.animation="none";c.style.transition="none";});
  document.body.appendChild(clone);
  el.style.opacity="0";el.style.pointerEvents="none";

  const shakeDur=480, fadeDur=1500;
  const start=performance.now();
  function tick(now){
    const t=now-start;
    if(t<shakeDur){
      // Smooth sine-wave shake: amplitude decays as shake progresses
      const progress=t/shakeDur;
      const decay=1-progress; // amplitude shrinks to 0
      const freq=18; // oscillations per second
      const amp=5*decay;
      const x=amp*Math.sin(freq*progress*Math.PI*2);
      clone.style.transform=`translateX(${x.toFixed(2)}px)`;
      requestAnimationFrame(tick);
    }else{
      // Shake done — fade out with rAF
      clone.style.transform="translateX(0)";
      const fadeStart=now;
      function fade(fn){
        const ft=fn-fadeStart;
        const op=Math.max(0,1-ft/fadeDur);
        clone.style.opacity=op;
        if(op>0)requestAnimationFrame(fade);
        else clone.remove();
      }
      requestAnimationFrame(fade);
    }
  }
  requestAnimationFrame(tick);
}

// Detect minions killed by spell and trigger death animations before render
// Returns true if any deaths occurred (caller should delay render by 1800ms)
function spellDeathAnims(prevState, nextState){
  let anyDied=false;
  if(prevState.ai&&nextState.ai){
    prevState.ai.board.forEach((m,i)=>{
      if(!nextState.ai.board.find(n=>n.uid===m.uid)){
        const el=document.querySelector(`.em[data-ei="${i}"] .minion`)||document.querySelector(`.em[data-ei="${i}"]`);
        if(el){playDeathAnim(el);anyDied=true;}
      }
    });
  }
  if(prevState.player&&nextState.player){
    prevState.player.board.forEach((m,i)=>{
      if(!nextState.player.board.find(n=>n.uid===m.uid)){
        const el=document.querySelector(`.om[data-oi="${i}"] .minion`)||document.querySelector(`.om[data-oi="${i}"]`);
        if(el){playDeathAnim(el);anyDied=true;}
      }
    });
  }
  return anyDied;
}

function lungeAtk(atkEl,defEl,onImpact,onDone){
  if(!atkEl||!defEl){onImpact();setTimeout(onDone,0);return;}
  Audio.sfxMinionAttack();
  const ar=atkEl.getBoundingClientRect(),dr=defEl.getBoundingClientRect();
  const dx=((dr.left+dr.width/2)-(ar.left+ar.width/2))*.78;
  const dy=((dr.top+dr.height/2)-(ar.top+ar.height/2))*.78;

  // Clone the minion and attach to body as fixed — bypasses ALL z-index/stacking issues
  const clone=atkEl.cloneNode(true);
  clone.style.cssText=`position:fixed;left:${ar.left}px;top:${ar.top}px;width:${ar.width}px;height:${ar.height}px;pointer-events:none;z-index:9000;transition:transform .22s cubic-bezier(.25,0,.4,1),opacity .08s .2s`;
  document.body.appendChild(clone);

  // Hide original
  atkEl.style.opacity="0";

  // Kick off lunge forward
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    clone.style.transform=`translate(${dx}px,${dy}px) scale(1.05)`;
  }));

  setTimeout(()=>{
    // Impact — show damage, play recoil
    onImpact();
    clone.style.transition="transform .32s cubic-bezier(.2,1.2,.5,1)";
    clone.style.transform="translate(0,0) scale(1)";
    setTimeout(()=>{
      clone.remove();
      // Only restore opacity if NOT being handled by playDeathAnim
      // playDeathAnim sets pointerEvents:none as a marker
      if(atkEl.style.pointerEvents!=="none")atkEl.style.opacity="";
      onDone();
    },340);
  },240);
}

function deckDragUp(e){
  if(!deckDrag.active)return;
  const p=pt(e,true);
  if(deckDrag.ghost){deckDrag.ghost.remove();deckDrag.ghost=null;}
  const{moved,id}=deckDrag;
  deckDrag={active:false,id:null,ghost:null,sx:0,sy:0,moved:false};
  document.removeEventListener("mousemove",deckDragMv);document.removeEventListener("mouseup",deckDragUp);
  document.removeEventListener("touchmove",deckDragMv);document.removeEventListener("touchend",deckDragUp);

// Update lag bars after render — if HP dropped, delay lag bar to create trailing effect
function updateLagBars(){
  if(!GAME)return;
  const isGuest=MP?.role==="guest";
  // ph uses lagHp["player"] (isAI=false in hHpBar), ah uses lagHp["ai"] (isAI=true)
  // Guest: ph shows GAME.ai.hp (own), ah shows GAME.player.hp (opponent)
  const bars=isGuest
    ?[{who:"player",id:"ph",hp:GAME.ai.hp},{who:"ai",id:"ah",hp:GAME.player.hp}]
    :[{who:"player",id:"ph",hp:GAME.player.hp},{who:"ai",id:"ah",hp:GAME.ai.hp}];
  bars.forEach(({who,id,hp:curHp})=>{
    const fillEl=document.getElementById("fill-"+id);
    const lagEl=document.getElementById("lag-"+id);
    if(!fillEl)return;

    if(lagHp[who]>curHp){
      const oldPct=Math.max(0,lagHp[who]/50*100);
      const newPct=Math.max(0,curHp/50*100);
      // Snap red bar to old, then animate to new
      fillEl.style.transition="none";
      fillEl.style.width=oldPct+"%";
      void fillEl.offsetWidth;
      fillEl.style.transition="width .6s cubic-bezier(.25,.8,.25,1)";
      fillEl.style.width=newPct+"%";
      // Lag bar: hold then catch up
      if(lagEl){
        lagEl.style.transition="none";
        lagEl.style.width=oldPct+"%";
        void lagEl.offsetWidth;
        setTimeout(()=>{
          const l=document.getElementById("lag-"+id);
          if(l){l.style.transition="width 1.2s cubic-bezier(.1,.5,.3,1)";l.style.width=newPct+"%";}
        },420);
      }
      // Shake scaled by damage amount
      const dmgAmt=lagHp[who]-curHp;
      const row=fillEl.closest(".hp-bar-row");
      if(row){
        const tier=dmgAmt<=2?1:dmgAmt<=4?2:dmgAmt<=7?3:4;
        const dur=tier===1?400:tier===2?460:tier===3?560:660;
        Audio.sfxHpHit(tier);
        row.classList.remove("shake1","shake2","shake3","shake4");
        row.classList.add("shake"+tier);
        setTimeout(()=>row.classList.remove("shake1","shake2","shake3","shake4"),dur+20);
      }
      lagHp[who]=curHp;
    }else if(lagHp[who]!==curHp){
      const newPct=Math.max(0,curHp/50*100);
      fillEl.style.transition="width .4s ease-out";
      fillEl.style.width=newPct+"%";
      if(lagEl){lagEl.style.transition="none";lagEl.style.width=newPct+"%";}
      lagHp[who]=curHp;
    }
  });
}

    item.addEventListener("mousedown",(e)=>{
      diStartLP();
      const p=pt(e);
      deckDrag={active:true,id,ghost:null,sx:p.x,sy:p.y,moved:false};
      document.addEventListener("mousemove",deckDragMv,{passive:false});
      document.addEventListener("mouseup",deckDragUp);
      document.addEventListener("mouseup",diReleaseLP,{once:true});
    });
    item.addEventListener("mouseleave",diCancelLP);
    // Touch: long-press + direction-aware drag
    item.addEventListener("touchstart",(e)=>{
      diStartLP();
      const p=pt(e);
      item._tStart={x:p.x,y:p.y,id,decided:false};
    },{passive:true});
    item.addEventListener("touchmove",(e)=>{
      const ts=item._tStart;if(!ts||ts.decided)return;
      const p=pt(e);
      const dx=Math.abs(p.x-ts.x),dy=Math.abs(p.y-ts.y);
      if(dx<6&&dy<6)return;
      ts.decided=true;
      diCancelLP(); // cancel long-press on any move
      if(dy>dx){item._tStart=null;}
      else{
        e.preventDefault();
        deckDrag={active:true,id:ts.id,ghost:null,sx:ts.x,sy:ts.y,moved:false};
        item._tStart=null;
        document.addEventListener("touchmove",deckDragMv,{passive:false});
        document.addEventListener("touchend",deckDragUp);
      }
    },{passive:false});
    item.addEventListener("touchend",()=>{item._tStart=null;diReleaseLP();});
  });
}

// ── DRAG SYSTEM ───────────────────────
function pt(e,ch){const s=(ch&&e.changedTouches)?e.changedTouches:e.touches;if(s&&s.length)return{x:s[0].clientX,y:s[0].clientY};return{x:e.clientX,y:e.clientY};}
function clearLP(){if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}}
// MP perspective helpers — use these everywhere instead of hardcoded GAME.player/turn
const myTurn=()=>MP?.role==="guest"?GAME?.turn==="ai":GAME?.turn==="player";
const myHand=()=>MP?.role==="guest"?GAME?.ai?.hand:GAME?.player?.hand;
const myBoard=()=>MP?.role==="guest"?GAME?.ai?.board:GAME?.player?.board;
const myMana=()=>MP?.role==="guest"?GAME?.ai?.mana:GAME?.player?.mana;

function addDragListeners(){
  if(listenersAdded)return;listenersAdded=true;
  document.addEventListener("mousemove",onMove,{passive:false});document.addEventListener("mouseup",onUp);
  document.addEventListener("touchmove",onMove,{passive:false});document.addEventListener("touchend",onUp);
  document.addEventListener("mousedown",onDown);document.addEventListener("touchstart",onDown,{passive:false});
}
function onDown(e){
  if(SCR!=="battle"||!GAME||GAME.over||animLock)return;
  const hs=e.target.closest(".hs"),om=e.target.closest(".om"),em=e.target.closest(".em");
  if(!hs&&!om&&!em)return;
  e.preventDefault();const p=pt(e);
  if(hs){
    // Always allow long-press zoom regardless of turn; block dragging if not turn
    const hw=document.querySelector(".hand-wrap");
    let idx=+hs.dataset.hi;
    if(hw){
      const allHs=Array.from(hw.querySelectorAll(".hs"));
      const fanContainer=allHs[0]?.parentElement;
      if(fanContainer){
        const fanLeft=fanContainer.getBoundingClientRect().left;
        let bestIdx=0;
        for(const hsEl of allHs){
          const leftOffset=parseFloat(hsEl.style.left)||0;
          if(p.x>=fanLeft+leftOffset) bestIdx=+hsEl.dataset.hi;
        }
        idx=bestIdx;
      }
    }
    const srcEl=hw?hw.querySelectorAll(".hs")[idx]:hs;
    if(!myTurn()){
      // Not our turn: only allow long-press zoom, no dragging
      drag={active:true,type:"hand",cardIdx:idx,boardIdx:-1,startX:p.x,startY:p.y,dragging:false,ghost:null,insertSlot:null,srcEl:srcEl||hs,wasLP:false,noAction:true};
      lpTimer=setTimeout(()=>{lpTimer=null;if(!drag.dragging){drag.wasLP=true;showZoom(idx);}},500);
      return;
    }
    drag={active:true,type:"hand",cardIdx:idx,boardIdx:-1,startX:p.x,startY:p.y,dragging:false,ghost:null,insertSlot:null,srcEl:srcEl||hs,wasLP:false};
    lpTimer=setTimeout(()=>{lpTimer=null;if(!drag.dragging){drag.wasLP=true;showZoom(idx);}},500);
  } else if(om){
    if(!myTurn()){return;}
    const bi=+om.dataset.oi;
    drag={active:true,type:"board",cardIdx:-1,boardIdx:bi,startX:p.x,startY:p.y,dragging:false,ghost:null,insertSlot:null,srcEl:null,wasLP:false};
    // long-press player board card → zoom

// ── PROXIMITY ARROW ───────────────────
const PROX=160,READY=78;
function updateProxArrow(fx,fy){

    const minionEl=em.querySelector(".minion");
    const my=minionEl?minionEl.getBoundingClientRect().bottom:r.bottom;

  });

      yMin:r.bottom-10,yMax:r.bottom+70,

      t.dist=Math.sqrt((t.x-fx)**2+(t.y-fy)**2);
    }

  if(!arrowEl){arrowEl=document.createElement("div");arrowEl.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:997";document.body.appendChild(arrowEl);}

  arrowEl.innerHTML=`<svg width="100%" height="100%" overflow="visible" style="position:absolute;inset:0">
    <defs>
      <linearGradient id="${gid}" x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="${colFade}"/>
        <stop offset="100%" stop-color="${col}"/>

      </marker>

    </defs>

    <path class="arrow-march" d="M${fx},${fy} Q${bcx},${bcy} ${tx},${ty}"
      stroke="url(#${gid})" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arh)"/>

function closestTarget(fx,fy){
  const ts=[];
  document.querySelectorAll(".em").forEach(em=>{const r=em.getBoundingClientRect();const mEl=em.querySelector(".minion");const my=mEl?mEl.getBoundingClientRect().bottom:r.bottom;ts.push({el:em,x:r.left+r.width/2,y:my});});
