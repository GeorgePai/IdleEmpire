  if(MP)mpBroadcastNow({type:"attack",bi,tw:"ai",ti,atkDmg:defDmg,defDmg:atkDmg,ts:Date.now()});
  const atkEl=document.querySelector(`.om[data-oi="${bi}"] .minion`);
  const defEl=ti===-1?document.getElementById("ah"):(document.querySelector(`.em[data-ei="${ti}"] .minion`)||document.querySelector(`.em[data-ei="${ti}"]`));
  animLock=true;
  lungeAtk(atkEl,defEl,()=>{
    if(defEl){const r=defEl.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,defDmg);}
    if(atkEl&&atkDmg>0){const r=atkEl.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,atkDmg);}
    if(defDies&&defEl)playDeathAnim(defEl);
    if(atkDies&&atkEl)playDeathAnim(atkEl);
  },()=>{
    animLock=false;
    // Don't restore atkEl opacity — playDeathAnim already hid it
    const anyDies=defDies||atkDies;
    setTimeout(()=>{
      if(anyDies){
        // FLIP: capture current positions before render
        const oms=Array.from(document.querySelectorAll('.om'));
        const ems=Array.from(document.querySelectorAll('.em'));
        const prevPos={};
        [...oms,...ems].forEach(el=>{const r=el.getBoundingClientRect();prevPos[el.dataset.oi??'e'+el.dataset.ei]={x:r.left,y:r.top};});
        GAME=ns;render();
        // Animate from old positions to new
        requestAnimationFrame(()=>{
          const allMinions=[...document.querySelectorAll('.om'),...document.querySelectorAll('.em')];
          allMinions.forEach(el=>{
            const key=el.dataset.oi??'e'+el.dataset.ei;
            const prev=prevPos[key];if(!prev)return;
            const nr=el.getBoundingClientRect();
            const dx=prev.x-nr.left,dy=prev.y-nr.top;
            if(Math.abs(dx)<2&&Math.abs(dy)<2)return;
            el.style.transition='none';el.style.transform=`translate(${dx}px,${dy}px)`;
            void el.offsetLeft;
            el.style.transition='transform .4s cubic-bezier(.25,1,.4,1)';
            el.style.transform='translate(0,0)';
            setTimeout(()=>el.style.transform='',420);
          });
        });
      }else{GAME=ns;render();}
    }, anyDies?2100:0);
  });
}

// ── DISPATCH ──────────────────────────
function act(a,fromNetwork=false){
  // ── MP Guest: manage local UI state; only send real actions to Firebase ──
  if(MP&&MP.role==="guest"&&!fromNetwork){
    const flipped=mpFlip(GAME)||{};
    const fpl=flipped.player||{};
    const fai=flipped.ai||{};

    if(a.t==="OM"){
      // Select/deselect own minion for attack
      const m=(fpl.board||[])[a.i];
      if(!m){guestUI={selAtk:null,selCard:null,mode:"default"};render();return;}
      if(m.sick){toast("召喚後本回合不能攻擊","warn");return;}
      if(m.attacked){toast("此隨從本回合已行動","warn");return;}
      guestUI=guestUI.selAtk===a.i
        ?{selAtk:null,selCard:null,mode:"default"}
        :{selAtk:a.i,selCard:null,mode:"attacking"};
      render();return;
    }
    if(a.t==="HC"){
      // If spell that needs targeting: just update local selection
      const c=(fpl.hand||[])[a.i];
      if(!c)return;
      if(c.type==="spell"&&c.effect!=="draw"&&c.effect!=="heal"&&c.effect!=="aoe"&&c.effect!=="random_destroy"){
        guestUI=guestUI.selCard===a.i
          ?{selAtk:null,selCard:null,mode:"default"}
          :{selAtk:null,selCard:a.i,mode:"targeting"};
        render();return;
      }
      // Self-cast spell or minion: send to Firebase directly
      mpGuestAct(a);guestUI={selAtk:null,selCard:null,mode:"default"};return;
    }
    if(a.t==="HC_AT"){mpGuestAct(a);guestUI={selAtk:null,selCard:null,mode:"default"};return;}
    if(a.t==="EM"){
      if(guestUI.mode==="attacking"&&guestUI.selAtk!=null){
        mpGuestAct({t:"BOARD_ATK",bi:guestUI.selAtk,tw:"ai",ti:a.i});
      }else if(guestUI.mode==="targeting"&&guestUI.selCard!=null){
        mpGuestAct({t:"SPELL_TGT",ci:guestUI.selCard,tw:"ai",ti:a.i});
      }
      guestUI={selAtk:null,selCard:null,mode:"default"};return;
    }
    if(a.t==="EH"){
      if(guestUI.mode==="attacking"&&guestUI.selAtk!=null){
        mpGuestAct({t:"BOARD_ATK",bi:guestUI.selAtk,tw:"ai",ti:-1});
      }else if(guestUI.mode==="targeting"&&guestUI.selCard!=null){
        mpGuestAct({t:"SPELL_TGT",ci:guestUI.selCard,tw:"ai",ti:-1});
      }
      guestUI={selAtk:null,selCard:null,mode:"default"};return;
    }
    if(a.t==="PM"){
      if(guestUI.mode==="targeting"&&guestUI.selCard!=null){
        // Guest targeting own minion (e.g. heal) — own board in flipped view = server's ai board
        mpGuestAct({t:"SPELL_TGT",ci:guestUI.selCard,tw:"player",ti:a.i});
      }
      guestUI={selAtk:null,selCard:null,mode:"default"};return;
    }
    if(a.t==="PH"){
      if(guestUI.mode==="targeting"&&guestUI.selCard!=null){
        mpGuestAct({t:"SPELL_TGT",ci:guestUI.selCard,tw:"player",ti:-1});
      }
      guestUI={selAtk:null,selCard:null,mode:"default"};return;
    }
    if(a.t==="CL"){guestUI={selAtk:null,selCard:null,mode:"default"};render();return;}
    if(a.t==="ET"){mpGuestAct({t:"ET"});guestUI={selAtk:null,selCard:null,mode:"default"};return;}
    // Fallback: send anything else directly
    mpGuestAct(a);return;
  }
  if(!GAME||GAME.over||GAME.turn!=="player"||animLock)return;const g=GAME;
  if(a.t==="EA"){
    // Fix 8: all-target damage
    if(g.mode==="targeting"&&g.selCard!=null){
      const card=g.player.hand[g.selCard];
      if(card&&card.effect==="dmg"){
        setTimeout(()=>{document.querySelectorAll(".em .minion,#ah").forEach(el=>{if(el){const r=el.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,card.val);}});},60);
      }
      const ns2={...castS(g,g.selCard,"player","ai",-2),selCard:null,selAtk:null,mode:"default"};
      const died2=spellDeathAnims(g,ns2);
      GAME=ns2;
      if(died2)setTimeout(()=>render(),1800);else render();
    }
  }else if(a.t==="HC"){
    const c=g.player.hand[a.i];if(!c)return;if(c.cost>g.player.mana){toast("魔力不足！","err");return;}
    if(c.type==="minion"){if(g.player.board.length>=7){toast("戰場已滿！","err");return;}const mn={...c,uid:uid(),curHp:c.hp,sick:true,attacked:false};const nb=[...g.player.board,mn];GAME={...alog({...g,player:{...g.player,mana:g.player.mana-c.cost,hand:g.player.hand.filter((_,i)=>i!==a.i),board:nb}},`⚔️你召：${c.name}`),selCard:null,selAtk:null,mode:"default"};newSummonUid=mn.uid;setTimeout(()=>{newSummonUid=null;},500);}
    else if(c.effect==="draw"||c.effect==="heal"){
      GAME={...castS(g,a.i,"player","player",-1),selCard:null,selAtk:null,mode:"default"};
      if(c.effect==="heal"){setTimeout(()=>{const ph=document.getElementById("ph");if(ph){const r=ph.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,c.val,true);}},60);}
      render();
    }else if(c.effect==="aoe"){
      Audio.sfxSpellDmg();
      const nsA={...castS(g,a.i,"player","ai",-2),selCard:null,selAtk:null,mode:"default"};
      spellDeathAnims(g,nsA);GAME=nsA;
      setTimeout(()=>{document.querySelectorAll(".em .minion,#ah").forEach(el=>{if(el){const r=el.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,c.val||2);}});shakeHpBar("ai",c.val||2);},60);
      render();
    }else if(c.effect==="random_destroy"){
      Audio.sfxSpellCast();
      const nsR={...castS(g,a.i,"player","player",-1),selCard:null,selAtk:null,mode:"default"};
      const diedR=spellDeathAnims(g,nsR);GAME=nsR;
      if(diedR)setTimeout(()=>render(),2500);else render();
    }else{toast("請拖曳法術卡到目標","warn");return;}
  }else if(a.t==="OM"){
    if(g.mode==="targeting"){
      const card=g.player.hand[g.selCard];
      if(card&&(card.effect==="dmg"||card.effect==="heal"||card.effect==="drain")){
        act({t:"PM",i:a.i});return;
      }
      GAME={...g,selCard:null,mode:"default"};
    }
    else{const m=g.player.board[a.i];if(!m)return;if(m.sick){toast("召喚後本回合不能攻擊","warn");return;}if(m.attacked){toast("此隨從本回合已行動","warn");return;}GAME=g.selAtk===a.i?{...g,selAtk:null,mode:"default"}:{...g,selAtk:a.i,mode:"attacking",selCard:null};}
  }else if(a.t==="EM"){
    if(g.mode==="targeting"&&g.selCard!=null){
      const card=g.player.hand[g.selCard];
      const ns={...castS(g,g.selCard,"player","ai",a.i),selCard:null,selAtk:null,mode:"default"};
      const died=spellDeathAnims(g,ns);
      if(card){
        if(card.effect==="dmg")Audio.sfxSpellDmg();else Audio.sfxSpellCast();
        const t=document.querySelector(`.em[data-ei="${a.i}"] .minion`)||document.querySelector(`.em[data-ei="${a.i}"]`);if(t){const r=t.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,card.val,card.effect==="heal");}
      }
      GAME=ns;if(died)setTimeout(()=>render(),1800);
    }else if(g.mode==="attacking"&&g.selAtk!=null){doPlayerAtk(g.selAtk,"ai",a.i);return;}
  }else if(a.t==="EH"){
    if(g.mode==="targeting"&&g.selCard!=null){
      const card=g.player.hand[g.selCard];
      const ns={...castS(g,g.selCard,"player","ai",-1),selCard:null,selAtk:null,mode:"default"};
      if(card){
        if(card.effect==="dmg")Audio.sfxSpellDmg();else if(card.effect==="heal")Audio.sfxSpellHeal();else Audio.sfxSpellCast();
        const ah=document.getElementById("ah");
        if(ah){const r=ah.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,card.val,card.effect==="heal");}
      }
      GAME=ns;
    }else if(g.mode==="attacking"&&g.selAtk!=null){doPlayerAtk(g.selAtk,"ai",-1);return;}
  }else if(a.t==="PH"){
    if(g.mode==="targeting"&&g.selCard!=null){
      const card=g.player.hand[g.selCard];
      const isHeal=card&&card.effect==="heal";
      if(isHeal)Audio.sfxSpellHeal();else Audio.sfxSpellCast();
      const ns={...castS(g,g.selCard,"player","player",-1),selCard:null,selAtk:null,mode:"default"};
      if(card){const ph=document.getElementById("ph");if(ph){const r=ph.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,card.val,isHeal);}}
      GAME=ns;
    }
  }else if(a.t==="PM"){
    if(g.mode==="targeting"&&g.selCard!=null){
      const card=g.player.hand[g.selCard];
      if(card)Audio.sfxSpellCast();
      const ns={...castS(g,g.selCard,"player","player",a.i),selCard:null,selAtk:null,mode:"default"};
      const died=spellDeathAnims(g,ns);
      if(card){const t=document.querySelector(`.om[data-oi="${a.i}"] .minion`);if(t){const r=t.getBoundingClientRect();floatDmg(r.left+r.width/2,r.top,card.val,true);}}
      GAME=ns;if(died)setTimeout(()=>render(),1800);
    }
  }else if(a.t==="HC_AT"){
    const c=g.player.hand[a.i];if(!c)return;if(c.cost>g.player.mana){toast("魔力不足！","err");return;}if(c.type!=="minion")return;if(g.player.board.length>=7){toast("戰場已滿！","err");return;}
    const slot=Math.min(Math.max(0,a.slot??g.player.board.length),g.player.board.length);
    const mn={...c,uid:uid(),curHp:c.hp,sick:true,attacked:false};
    let board=[...g.player.board];board.splice(slot,0,mn);
    let newG={...g,player:{...g.player,mana:g.player.mana-c.cost,hand:g.player.hand.filter((_,i)=>i!==a.i),board}};
    // Rally: +1 ATK to all OTHER friendly minions
    if(c.effect==="rally"){
      newG.player={...newG.player,board:newG.player.board.map(m=>({...m,atkBuff:(m.atkBuff||0)+1,atk:m.atk+1}))};
      toast("⚔ 戰吼！我方隨從攻擊力+1","ok");
      // Stagger rally SFX and jelly animation per buffed minion
      const buffedUids=newG.player.board.filter(m=>m.uid!==mn.uid).map(m=>m.uid);
      setTimeout(()=>{
        Audio.sfxRallyTrigger();
        buffedUids.forEach((buid,i)=>{
          setTimeout(()=>{
            Audio.sfxRallyBuff();
            // Find the ATK triangle SVG in the minion card and animate it
            const els=document.querySelectorAll(".om");
            els.forEach(om=>{
              const minionEl=om.querySelector(".minion");
              if(!minionEl)return;
              // Find atk triangle (first svg in minion)
              const tri=minionEl.querySelector(".atk-tri");
              if(tri){tri.style.animation="none";void tri.offsetWidth;tri.style.animation="atkJelly .55s cubic-bezier(.3,1.4,.5,1)";}
            });
          },i*140);
        });
      },450);
    }
    GAME={...alog(newG,`⚔️你召：${c.name}`),selCard:null,selAtk:null,mode:"default"};
    Audio.sfxMinionSummon();
    newSummonUid=mn.uid;setTimeout(()=>{newSummonUid=null;},500);
    // Fix 6: taunt shield flash animation after minionIn settles
    if(c.taunt){setTimeout(()=>{
      Audio.sfxTauntSummon();
      const el=document.querySelector(`.om .minion.new-summon`)||document.querySelector(`[data-uid="${mn.uid}"] .minion`);
      if(el){el.classList.add("taunt-flash");setTimeout(()=>el.classList.remove("taunt-flash"),880);}
    },600);}
  }else if(a.t==="BOARD_ATK"){
    const m=g.player.board[a.bi];if(m&&m.sick){toast("召喚後本回合不能攻擊","warn");return;}if(m&&m.attacked){toast("此隨從本回合已行動","warn");return;}doPlayerAtk(a.bi,a.tw,a.ti);return;
  }else if(a.t==="CL"){GAME={...g,selCard:null,selAtk:null,mode:"default"};
  }else if(a.t==="ET"){
    if(MP){
      // MP: host ends turn → guest's turn, no AI script
      toast("對方回合","ai");Audio.sfxTurnStartAI();
      GAME=startT({...g,selCard:null,selAtk:null,mode:"default"},"ai");
      render();mpSave();return;
    }
    toast("對方回合","ai");Audio.sfxTurnStartAI();GAME=startT({...g,selCard:null,selAtk:null,mode:"default"},"ai");
  }
  render();
  // MP Host: save state after every action
  if(MP&&MP.role==="host")mpSave();
}

// ── ROUTER ────────────────────────────
const R=()=>document.getElementById("root");
let _lastTurn=null;
function render(){
  if(SCR==="menu")showMenu();
  else if(SCR==="decks")showDecks();
  else if(SCR==="deck")showDeck();
  else if(SCR==="battle"&&GAME){showBattle();requestAnimationFrame(()=>updateLagBars());}
  // "你的回合" toast: perspective-aware for MP
  if(GAME&&!GAME.over){
    const isMyTurnNow=(GAME.turn==="player"&&!MP)||(GAME.turn==="player"&&MP?.role==="host")||(GAME.turn==="ai"&&MP?.role==="guest");
    const wasMyTurnLast=((_lastTurn==="player"&&!MP)||(_lastTurn==="player"&&MP?.role==="host")||(_lastTurn==="ai"&&MP?.role==="guest"));
    if(isMyTurnNow&&!wasMyTurnLast){setTimeout(()=>toast("你的回合！","ok"),90);}
  }
  _lastTurn=GAME?.turn??null;
  if(GAME&&(GAME.lastDraws?.length||GAME.aiNewCard)){
    const draws=[...(GAME.lastDraws||[])];
    if(draws.length){
      requestAnimationFrame(()=>{
        // ── FLIP: slide existing cards from old positions to new positions ──
        const allHs=Array.from(document.querySelectorAll('.hs'));
        const pendingHs=allHs.filter(el=>el.classList.contains('draw-pending'));
        const existingHs=allHs.filter(el=>!el.classList.contains('draw-pending'));
        const nNew=allHs.length;
        const nOld=nNew-pendingHs.length;
        const cw=82;
        const ovOld=nOld>7?18:nOld>5?26:36;
        const ovNew=nNew>7?18:nNew>5?26:36;

        // Step 1: snap existing cards to OLD positions (no transition)
        existingHs.forEach((el,i)=>{
          el.style.transition='none';
          el.style.left=(i*ovOld)+'px';
        });

        // Force reflow — browser MUST commit old positions before we start transition
        // Reading offsetLeft causes synchronous layout, preventing frame batching
        existingHs.forEach(el=>void el.offsetLeft);

        // Step 2: now animate to NEW positions with smooth easing
        existingHs.forEach((el)=>{
          const hi=+el.dataset.hi;
          el.style.transition='left .5s cubic-bezier(0.34,1.15,0.64,1),transform .15s';
          el.style.left=(hi*ovNew)+'px';
        });

        // Step 3: after slide settles (~320ms), fly in new cards one by one
        draws.forEach((uid,i)=>{setTimeout(()=>Audio.sfxCardDraw(),320+i*650);animFlyIntoSlot(uid, 320+i*650);});
      });
    }
    const clearDelay=draws.length?320+draws.length*650+750:700;
    setTimeout(()=>{if(GAME)GAME={...GAME,lastDraws:[],aiNewCard:false};},clearDelay);
  }
}
try{render();}catch(e){R().innerHTML=`<div style="color:#f66;padding:30px;font-family:monospace;background:#111;min-height:100vh"><b>ERROR:</b><br><br>${e.stack.replace(/\n/g,"<br>")}</div>`;}
</script>
