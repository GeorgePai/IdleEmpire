<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e14">
<title>IdleEmpire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono:wght@300;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css?v=3">
</head>
<body>
  <div id="app">
    <header id="topBar">
      <div class="brandRow">
        <div class="brand">
          <span class="brandSymbol">EPC</span>
          <span class="brandName">Empire 虛擬貨幣</span>
          <span class="dot live"></span>
        </div>
        <div class="topActions">
          <button id="indicatorBtn" title="指標選單">指標</button>
          <button id="muteBtn" title="切換音樂">♪</button>
        </div>
      </div>
      <div class="statsRow">
        <div class="stat">
          <span class="label">現金</span>
          <span class="value" id="cashLabel">10,000</span>
        </div>
        <div class="stat">
          <span class="label">持倉</span>
          <span class="value" id="sharesLabel">0</span>
          <span class="sub" id="avgCostLabel"></span>
        </div>
        <div class="stat highlight">
          <span class="label">總資產</span>
          <span class="value" id="equityLabel">10,000</span>
          <span class="sub" id="pnlLabel">+0.00%</span>
        </div>
      </div>
      <div class="goalRow">
        <div class="goalBar"><div id="goalProgress"></div></div>
        <div class="goalText">
          <span>目標</span>
          <span id="goalPctLabel">0.00%</span>
          <span>10,000,000</span>
        </div>
      </div>
    </header>

    <section id="indicatorDrawer" class="hidden">
      <div class="drawerRow">
        <div class="drawerLabel">K 線週期</div>
        <div class="drawerControls">
          <button class="periodBtn" data-period="5">5 秒</button>
          <button class="periodBtn active" data-period="15">15 秒</button>
          <button class="periodBtn" data-period="30">30 秒</button>
        </div>
      </div>
      <div class="drawerRow">
        <div class="drawerLabel">均線 1</div>
        <div class="drawerControls">
          <input type="number" id="ma1Input" min="1" max="200" value="5" class="maInput">
          <span class="maColorDot ma1Color"></span>
          <label class="switch">
            <input type="checkbox" id="ma1Toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="drawerRow">
        <div class="drawerLabel">均線 2</div>
        <div class="drawerControls">
          <input type="number" id="ma2Input" min="1" max="200" value="20" class="maInput">
          <span class="maColorDot ma2Color"></span>
          <label class="switch">
            <input type="checkbox" id="ma2Toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="drawerRow">
        <div class="drawerLabel">副圖</div>
        <div class="drawerControls">
          <label class="checkbox">
            <input type="checkbox" id="volToggle">
            <span>成交量</span>
          </label>
          <label class="checkbox">
            <input type="checkbox" id="chipToggle">
            <span>籌碼分佈</span>
          </label>
        </div>
      </div>
    </section>

    <section id="chartPanel">
      <div class="priceRow">
        <div class="priceMain">
          <span class="priceVal" id="priceNow">100.00</span>
          <span class="priceChange up" id="priceChange">+0.00 (+0.00%)</span>
        </div>
        <div class="legendRow" id="maLegend">
          <span class="legendDot ma1Color"></span><span id="ma1Label">MA 5</span>
          <span class="legendDot ma2Color"></span><span id="ma2Label">MA 20</span>
        </div>
      </div>
      <canvas id="priceChart"></canvas>
      <div class="timeAxis" id="timeAxis"></div>
    </section>

    <section id="subPanels" class="hidden">
      <div class="subBox" id="volBox">
        <div class="subHeader">
          <span class="subTitle">成交量</span>
          <span class="subVal numfont" id="volNowLabel">--</span>
        </div>
        <canvas id="volChart"></canvas>
      </div>
      <div class="subBox" id="chipBox">
        <div class="subHeader">
          <span class="subTitle">籌碼分佈</span>
          <span class="subVal numfont" id="chipMaxLabel"></span>
        </div>
        <canvas id="chipChart"></canvas>
      </div>
    </section>

    <section id="tradePanel">
      <div class="qtyRow">
        <button class="qtyBtn" data-qty="10">10</button>
        <button class="qtyBtn active" data-qty="100">100</button>
        <button class="qtyBtn" data-qty="1000">1K</button>
        <button class="qtyBtn" data-qty="max">全</button>
        <input id="qtyInput" type="number" min="1" inputmode="numeric">
      </div>
      <div class="btnRow">
        <button id="buyBtn" class="bigBtn buy">買 入</button>
        <button id="sellBtn" class="bigBtn sell">賣 出</button>
      </div>
    </section>

    <section id="logPanel">
      <div id="logArea"></div>
    </section>

    <div id="winScreen" class="hidden">
      <div class="winInner">
        <div class="winRibbon">CONGRATULATIONS</div>
        <h1>達成 1000 萬</h1>
        <p>用時 <span id="winTime"></span>，共 <span id="winTrades"></span> 筆交易</p>
        <button id="restartBtn" class="bigBtn buy">再來一局</button>
      </div>
    </div>

    <div id="toast" class="hidden"></div>
  </div>
  <script src="./game.js?v=3"></script>
</body>
</html>
