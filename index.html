<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Idle Empire — 像素放置王國</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css?v=30">
</head>
<body>
  <!-- 載入畫面 -->
  <div id="loadingScreen">
    <div class="loading-inner">
      <div class="loading-title">IDLE EMPIRE</div>
      <div class="loading-subtitle">像素放置王國</div>
      <div class="loading-bar"><div id="loadingFill"></div></div>
      <div id="loadingStatus">準備中</div>
    </div>
  </div>

  <!-- 主遊戲容器 -->
  <div id="game" class="hidden">
    <canvas id="world"></canvas>

    <!-- 頂部資源欄（v2.1：純文字標籤、無 emoji） -->
    <div id="topBar">
      <div class="res" data-res="gold"><span class="lbl">金幣</span><span class="val">0</span></div>
      <div class="res" data-res="food"><span class="lbl">糧食</span><span class="val">0</span></div>

      <div id="milestone"></div>

      <div class="spacer"></div>

      <div id="dayInfo">
        <span id="dayLabel">第 1 天</span>
        <span id="timeLabel">早晨</span>
        <button id="muteBtn" title="切換音樂">音</button>
        <button id="speedBtn" title="切換遊戲速度">1x</button>
      </div>
    </div>

    <!-- 提示飄字層（由 JS 操作） -->
    <div id="floaters"></div>

    <!-- 右側狀態 / 詳情面板 -->
    <aside id="sidePanel" class="hidden">
      <button class="closeBtn" id="closeSide">✕</button>
      <div id="sideContent"></div>
    </aside>

    <!-- 底部建造選單（v2.1：純文字） -->
    <div id="bottomBar">
      <button class="bigBtn" id="buildBtn">建造</button>
    </div>

    <!-- 建造選單彈窗 -->
    <div id="buildMenu" class="modal hidden">
      <div class="modal-inner">
        <h2>選擇要建造的建築</h2>
        <div id="buildList"></div>
        <button class="closeBtn" data-close="buildMenu">✕</button>
      </div>
    </div>

    <!-- v1.6：市場、玩法說明先拿掉，等系統再深些回來 -->

    <!-- 建造擺放提示 -->
    <div id="placementHint" class="hidden">
      <span id="placementText">點空地擺放，ESC 取消</span>
    </div>

    <!-- 警告浮窗 -->
    <div id="toast" class="hidden"></div>
  </div>

  <script src="./game.js?v=30"></script>
</body>
</html>
