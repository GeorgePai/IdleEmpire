<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e14">
<title>EMPIRE INDEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&family=JetBrains+Mono:wght@300;500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css?v=30">
</head>
<body>

<!-- ===== GLOBE SCREEN ===== -->
<div id="globeScreen" class="hidden">
  <div class="globeStars" id="globeStars"></div>
  <canvas id="globeCanvas"></canvas>
  <div class="globeOverlay">
    <div class="globeTitle">EMPIRE INDEX</div>
    <div class="globeSub">選擇交易市場</div>
    <div id="globeMarketInfo" class="globeMarketInfo hidden"></div>
    <button id="globeEnterBtn" class="globeEnterBtn hidden">進入市場</button>
    <div id="globeCodeRow" class="globeCodeRow">
      <input id="globeCodeInput" class="globeCodeInput" type="text" placeholder="貼上數據碼 EPC-XXXXXX">
      <button id="globeCodeLoadBtn" class="globeCodeLoadBtn">載入</button>
    </div>
  </div>
</div>

<!-- ===== NICKNAME SCREEN ===== -->
<div id="nicknameScreen" class="hidden">
  <div class="nickCard">
    <div class="nickTitle">設定暱稱</div>
    <div class="nickSection">
      <div class="nickLabel">暱稱</div>
      <input id="nickInput" class="nickInputField" type="text" maxlength="20" placeholder="輸入你的暱稱">
      <button id="nickStartBtn" class="nickBtn primary">開始交易</button>
    </div>
    <button id="nickBackBtn" class="nickBtn secondary nickBack">← 返回地球</button>
  </div>
</div>

<!-- ===== MAIN GAME ===== -->
<div id="app" class="hidden">

  <header id="topBar">
    <div class="brandRow">
      <div class="brand">
        <span class="brandSymbol">EPC</span>
        <span class="brandName">Empire 指數</span>
        <span class="dot live"></span>
        <span class="brandPulse" id="pulseLabel">DAY 0000</span>
      </div>
      <div class="topActions">
        <button id="backGlobeBtn" title="返回市場">← 市場</button>
        <button id="portfolioBtn" title="總資產覽">總覽</button>
        <button id="leaderboardBtn" title="排行榜">榜</button>
        <button id="codeBtn" title="生成存檔碼">碼</button>
        <button id="muteBtn" title="音樂">♪</button>
      </div>
    </div>

    <div id="positionPanel">
      <div class="posMain">
        <div class="posMainLeft">
          <div class="posLiveLabel">即時價位</div>
          <div class="posPriceRow">
            <span class="posValue" id="priceNow">100.00</span>
            <span class="posTick" id="priceChange">+0.00 (+0.00%)</span>
          </div>
        </div>
        <div class="posMainRight">
          <span class="posMiniLabel" id="unrealPnlLabel">未實現</span>
          <span class="posPnl" id="unrealPnlAmount">--</span>
          <span class="posTick" id="unrealPnlPct"></span>
        </div>
      </div>
      <div class="posSub">
        <div class="posCell"><span class="posK">現金</span><span class="posV" id="cashLabel">10,000</span></div>
        <div class="posCell"><span class="posK">持倉</span><span class="posV" id="sharesLabel">0</span></div>
        <div class="posCell"><span class="posK">成本</span><span class="posV" id="avgCostLabel">--</span></div>
        <div class="posCell"><span class="posK">已實現</span><span class="posV" id="realPnlLabel">+0</span></div>
        <div class="posCell highlight"><span class="posK">總資產</span><span class="posV" id="equityLabel">10,000</span></div>
      </div>
    </div>

  </header>

  <!-- 廣播通知 -->
  <div id="broadcastBanner" class="broadcastBanner hidden"></div>

  <!-- 排行榜浮層 -->
  <div id="leaderboardOverlay" class="overlay hidden">
    <div class="overlayPanel large">
      <div class="overlayHeader">
        <span class="overlayTitle">即時排行榜</span>
        <button class="overlayClose" data-close="leaderboardOverlay">✕</button>
      </div>
      <div id="leaderboardList" class="lbList"><div class="lbEmpty">載入中...</div></div>

    </div>
  </div>

  <!-- 總資產總覽 -->
  <div id="portfolioOverlay" class="overlay hidden">
    <div class="overlayPanel large">
      <div class="overlayHeader">
        <span class="overlayTitle">資產總覽</span>
        <span id="portfolioNick" class="pfNick"></span>
        <button class="overlayClose" data-close="portfolioOverlay">✕</button>
      </div>
      <div id="portfolioList" class="pfList"></div>
      <div class="pfFooter">
        <span class="pfFooterLabel">合計總資產</span>
        <span id="portfolioTotal" class="pfFooterVal">--</span>
      </div>
    </div>
  </div>

  <!-- 指標浮層 -->
  <div id="indicatorOverlay" class="overlay hidden">
    <div class="overlayPanel">
      <div class="overlayHeader">
        <span class="overlayTitle">指標設定</span>
        <button class="overlayClose" data-close="indicatorOverlay">✕</button>
      </div>
      <div class="drawerRow">
        <div class="drawerLabel">K 線週期</div>
        <div class="drawerControls">
          <button class="periodBtn active" data-period="5">1 天</button>
          <button class="periodBtn" data-period="15">3 天</button>
          <button class="periodBtn" data-period="30">6 天</button>
          <button class="periodBtn" data-period="60">12 天</button>
        </div>
      </div>
      <div class="drawerRow">
        <div class="drawerLabel">均線 1</div>
        <div class="drawerControls">
          <input type="number" id="ma1Input" min="1" max="200" value="5" class="maInput">
          <span class="maColorDot ma1Color"></span>
          <label class="switch"><input type="checkbox" id="ma1Toggle" checked><span class="slider"></span></label>
        </div>
      </div>
      <div class="drawerRow">
        <div class="drawerLabel">均線 2</div>
        <div class="drawerControls">
          <input type="number" id="ma2Input" min="1" max="200" value="20" class="maInput">
          <span class="maColorDot ma2Color"></span>
          <label class="switch"><input type="checkbox" id="ma2Toggle" checked><span class="slider"></span></label>
        </div>
      </div>
    </div>
  </div>



  <!-- mainArea: chart + log (log is absolute inside) -->
  <div id="mainArea">
    <section id="chartPanel">
      <div class="chartHeader">
        <div class="legendRow">
          <span class="legendItem" id="ma1Legend"><span class="legendDot ma1Color"></span><span id="ma1Label">MA 5</span></span>
          <span class="legendItem" id="ma2Legend"><span class="legendDot ma2Color"></span><span id="ma2Label">MA 20</span></span>
        </div>
        <button id="resetViewBtn" class="resetBtn hidden">回到最新</button>
      </div>
      <div class="chartBody">
        <canvas id="priceChart"></canvas>
        <button id="chartIndBtn" class="chartIndBtn" title="指標設定">⚙</button>
      </div>
      <div class="timeAxis" id="timeAxis"></div>
    </section>

    <!-- Log (absolute inside mainArea) -->
    <section id="logPanel" class="collapsed">
      <div class="logHeader">
        <div class="tabRow logTabs">
          <button class="tabBtn active" data-logtab="all">全部</button>
          <button class="tabBtn" data-logtab="trade">交易</button>
          <button class="tabBtn" data-logtab="news">新聞</button>
        </div>
        <button id="logToggleBtn" class="logToggle" title="展開/收合">▾</button>
      </div>
      <div id="logBody" class="logBody">
        <div id="logPending" class="logPending"></div>
        <div id="logAll" class="logList"></div>
        <div id="logTrade" class="logList hidden"></div>
        <div id="logNews" class="logList hidden"></div>
      </div>
    </section>
  </div>

  <!-- Trade panel (always visible, outside mainArea) -->
  <section id="tradePanel">
    <div class="modeRow">
      <button class="modeBtn active" data-mode="market">市價</button>
      <button class="modeBtn" data-mode="limit">限價</button>
    </div>
    <div class="qtyRow">
      <button class="qtyBtn" data-qty="10">10</button>
      <button class="qtyBtn active" data-qty="100">100</button>
      <button class="qtyBtn" data-qty="1000">1K</button>
      <button class="qtyBtn" data-qty="max">全倉</button>
      <input id="qtyInput" type="number" min="1" inputmode="numeric" placeholder="自訂">
    </div>
    <div class="limitPriceRow hidden" id="limitPriceRow">
      <span class="limitLabel">目標價</span>
      <input id="limitPriceInput" type="number" step="0.01" min="0.01" inputmode="decimal">
    </div>
    <div class="btnRow">
      <button id="buyBtn" class="bigBtn buy">買 入</button>
      <button id="sellBtn" class="bigBtn sell">賣 出</button>
    </div>
  </section>


  <!-- 存檔碼浮層 -->
  <div id="codeOverlay" class="overlay hidden">
    <div class="overlayPanel codePanel">
      <div class="overlayHeader">
        <span class="overlayTitle">存檔碼</span>
        <button class="overlayClose" data-close="codeOverlay">✕</button>
      </div>
      <p class="codeHint">複製此碼可在其他裝置或新遊戲中載入你的進度。</p>
      <textarea id="dataCodeOutput" class="lbCodeOutput" readonly placeholder="點擊生成..."></textarea>
      <button id="dataCodeBtn" class="lbCodeBtn">生成並複製</button>
    </div>
  </div>

  <div id="winScreen" class="hidden">
    <div class="winInner">
      <div class="winRibbon">CONGRATULATIONS</div>
      <h1>達成 5 萬</h1>
      <p>用時 <span id="winTime"></span>，共 <span id="winTrades"></span> 筆交易</p>
      <button id="restartBtn" class="bigBtn buy">再來一局</button>
    </div>
  </div>

</div>

<div id="toast" class="hidden"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="./game.js?v=30"></script>
</body>
</html>
