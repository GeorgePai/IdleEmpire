<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Idle Investor — 像素投資模擬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./IdleInvestor.css?v=1">
</head>
<body>
  <div id="app">
    <!-- 頂部資產欄 -->
    <header id="topBar">
      <div class="stat">
        <span class="label">現金</span>
        <span class="value" id="cashLabel">10,000</span>
      </div>
      <div class="stat">
        <span class="label">持倉</span>
        <span class="value" id="sharesLabel">0</span>
        <span class="sub" id="avgCostLabel"></span>
      </div>
      <div class="stat highlight">
        <span class="label">總資產</span>
        <span class="value" id="equityLabel">10,000</span>
        <span class="sub" id="pnlLabel">0.00%</span>
      </div>
      <div class="spacer"></div>
      <div class="stat goal">
        <span class="label">目標</span>
        <span class="value">10,000,000</span>
        <div class="progress"><div id="goalProgress"></div></div>
      </div>
      <button id="muteBtn" title="切換音樂">音</button>
    </header>

    <!-- 中央價格圖 -->
    <section id="chartPanel">
      <div class="chartHeader">
        <div class="ticker">
          <span class="symbol">IDX</span>
          <span class="name">幻象指數</span>
        </div>
        <div class="priceBox">
          <span id="priceNow">100.00</span>
          <span id="priceChange" class="up">▲ 0.00 (0.00%)</span>
        </div>
        <div class="legend">
          <span class="dot-ma5"></span>短期均線
          <span class="dot-ma20"></span>長期均線
        </div>
      </div>
      <canvas id="priceChart"></canvas>
    </section>

    <!-- 副圖：成交量 + 籌碼 -->
    <section id="subPanel">
      <div class="subBox">
        <div class="subTitle">成交量</div>
        <canvas id="volChart"></canvas>
      </div>
      <div class="subBox">
        <div class="subTitle">籌碼分佈</div>
        <canvas id="chipChart"></canvas>
      </div>
      <div class="subBox">
        <div class="subTitle">熱度</div>
        <div id="heatBar">
          <div id="heatFill"></div>
          <span id="heatVal">50</span>
        </div>
        <div class="heatLabel">
          <span class="cold">冷</span>
          <span class="hot">熱</span>
        </div>
      </div>
    </section>

    <!-- 操作區 -->
    <section id="tradePanel">
      <div class="qtyRow">
        <button class="qtyBtn" data-qty="1">1 股</button>
        <button class="qtyBtn" data-qty="10">10 股</button>
        <button class="qtyBtn" data-qty="100">100 股</button>
        <button class="qtyBtn" data-qty="max">全</button>
        <input id="qtyInput" type="number" min="1" value="10">
      </div>
      <div class="btnRow">
        <button id="buyBtn" class="bigBtn buy">買入</button>
        <button id="sellBtn" class="bigBtn sell">賣出</button>
      </div>
      <div id="logArea"></div>
    </section>

    <!-- 勝利畫面 -->
    <div id="winScreen" class="hidden">
      <div class="winInner">
        <h1>達標！</h1>
        <p>你把 10,000 滾到 10,000,000，<br>用時 <span id="winTime"></span>，共 <span id="winTrades"></span> 筆交易。</p>
        <button id="restartBtn" class="bigBtn">再來一局</button>
      </div>
    </div>

    <!-- 浮動提示 -->
    <div id="toast" class="hidden"></div>
  </div>

  <script src="./IdleInvestor.js?v=1"></script>
</body>
</html>
